        <div class="guide-section" style="max-width: 600px; margin: 0 auto; padding: 10px 20px 20px 20px;">
            <header style="text-align: center; margin-bottom: 15px;">
                <div style="font-size: 2rem; margin-bottom: 5px;">🎹</div>
                <h1 style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0 0 5px 0; font-size: 1.5rem;">Play Chord</h1>
                <p class="subtitle" style="font-size: 0.85rem; margin: 0;">Play all three notes of the displayed chord</p>
            </header>

            <!-- Best Score Display -->
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(99, 102, 241, 0.1); border-left: 4px solid var(--primary-color); border-radius: 6px; margin-bottom: 12px; font-size: 0.85rem; gap: 15px;">
                <div>
                    <span style="color: var(--text-secondary);">🏆 Best:</span>
                    <strong id="best-score-value" style="color: var(--primary-color); margin-left: 8px;">-</strong>

            <button id="start-btn" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 600; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 15px;">
                🎤 Start Training
            </button>

            <button id="stop-btn" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 600; background: #ef4444; color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 15px; display: none;">
                ⏹ Stop Training
            </button>

            <!-- Stats Display -->
            <div id="stats-display" style="display: none; margin-bottom: 12px; padding: 12px; background: var(--surface); border-radius: 8px;">
                <div style="display: flex; justify-content: space-around; text-align: center;">
                    <div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">Time Left</div>
                        <div id="time-left" style="font-size: 1.4rem; font-weight: bold; color: var(--primary-color); font-family: 'Courier New', monospace;">60</div>
                    </div>
                    <div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">Score</div>
                        <div id="score" style="font-size: 1.4rem; font-weight: bold; color: var(--accent-happy); font-family: 'Courier New', monospace;">0</div>
                    </div>

            <!-- Chord Display -->
            <div id="chord-display" style="display: none; margin-bottom: 20px; padding: 40px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2)); border-radius: 15px; text-align: center; border: 3px solid var(--primary-color);">
                <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 5px;">Play this chord:</div>
                <div id="current-chord" style="font-size: 4rem; font-weight: bold; color: var(--primary-color); font-family: 'Georgia', serif;">C</div>
            </div>

            <!-- Detected Notes -->
            <div id="detected-notes-display" style="display: none; margin-bottom: 20px; padding: 15px; background: var(--surface-light); border-radius: 10px;">
                <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; text-align: center;">Detected notes:</div>
                <div id="detected-notes-list" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; min-height: 40px;">
                    <!-- Will be filled with detected note badges -->
                </div>
            </div>

            <div id="success-message" style="display: none; text-align: center; padding: 30px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2)); border-radius: 15px; border: 3px solid var(--accent-happy); margin-top: 30px;">
                <div style="font-size: 4rem; margin-bottom: 15px;">🎉</div>
                <h2 style="color: var(--accent-happy); margin: 0 0 10px 0;">Time's Up!</h2>
                <p id="final-score" style="font-size: 1.5rem; color: var(--text-primary); margin: 10px 0;"></p>
                <p id="new-record" style="font-size: 1.2rem; color: var(--accent-happy); margin: 10px 0; display: none;">🏆 New Record!</p>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
    <script src="pitch-detector.js"></script>
    <script src="music-theory.js"></script>
    <script>
        const TRAINING_DURATION = 60; // seconds

        // All possible chords (major, minor, diminished)
        const ALL_CHORDS = [
            'C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B',
            'Cm', 'C#m', 'Dm', 'D#m', 'Em', 'Fm', 'F#m', 'Gm', 'G#m', 'Am', 'A#m', 'Bm',
            'Cdim', 'C#dim', 'Ddim', 'D#dim', 'Edim', 'Fdim', 'F#dim', 'Gdim', 'G#dim', 'Adim', 'A#dim', 'Bdim'
        ];

        // Base class for shared pitch detection logic
        class BaseTrainer {
            constructor() {
                this.audioContext = null;
                this.analyser = null;
                this.microphone = null;
                this.mediaStream = null;
                this.isRunning = false;
                this.lastDetectedNote = null;
                this.detectionCooldown = false;
                this.lastFrequency = null;
                this.stableCount = 0;
                this.wakeLock = null;
            }

            detect() {
                if (!this.isRunning) return;

                const buffer = new Float32Array(this.analyser.fftSize);
                this.analyser.getFloatTimeDomainData(buffer);

                const result = this.detectPitch(buffer);

                if (result && result.frequency) {
                    const note = this.frequencyToNote(result.frequency);
                    if (note) {
                        this.handleDetectedNote(note);
                    }
                }

                requestAnimationFrame(() => this.detect());
            }

            detectPitch(buffer) {
                const rms = PitchDetector.calculateRMS(buffer);
                if (rms < 0.005) return null;

                const autocorrelation = PitchDetector.autoCorrelate(buffer, this.audioContext.sampleRate);
                if (!autocorrelation) return null;

                let { frequency, confidence } = autocorrelation;

                if (frequency < 80 || frequency > 1200 || confidence < 0.80) return null;

                // Temporal smoothing
                if (this.lastFrequency) {
                    const freqDiff = Math.abs(frequency - this.lastFrequency);
                    const tolerance = this.lastFrequency * 0.03;

                    if (freqDiff < tolerance) {
                        this.stableCount++;
                        frequency = (frequency + this.lastFrequency) / 2;
                    } else {
                        this.stableCount = 0;
                    }
                }

                this.lastFrequency = frequency;

                if (this.stableCount < 1) return null;

                return { frequency, confidence };
            }

            frequencyToNote(frequency) {
                return PitchDetector.frequencyToNote(frequency);
            }

            async requestWakeLock() {
                if (!('wakeLock' in navigator)) {
                    console.warn('Screen Wake Lock API not supported');
                    return;
                }

                try {
                    this.wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.error('Wake Lock request failed:', err);
                }
            }

            async releaseWakeLock() {
                if (this.wakeLock !== null) {
                    try {
                        await this.wakeLock.release();
                        this.wakeLock = null;
                    } catch (err) {
                        console.error('Wake Lock release failed:', err);
                    }
                }
            }

            handleDetectedNote(note) {
                throw new Error('handleDetectedNote must be implemented by child class');
            }
        }

        class PlayChordTrainer extends BaseTrainer {
            constructor() {
                super();
                this.score = 0;
                this.timeLeft = TRAINING_DURATION;
                this.timerInterval = null;
                this.currentChord = null;
                this.requiredNotes = [];
                this.detectedNotes = new Set();

                this.init();
            }

            init() {
                const startBtn = document.getElementById('start-btn');
                const stopBtn = document.getElementById('stop-btn');

                startBtn.addEventListener('click', () => this.start());
                stopBtn.addEventListener('click', () => this.stop());

                this.displayBestScore();
            }

            displayBestScore() {
                const records = this.loadRecords();
                if (records && records.length > 0) {
                    const best = records[0];
                    const date = new Date(best.date);
                    const dateStr = date.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });

                    document.getElementById('best-score-value').textContent = best.score;
                    document.getElementById('best-score-date').textContent = `on ${dateStr}`;
                } else {
                    document.getElementById('best-score-value').textContent = '-';
                    document.getElementById('best-score-date').textContent = 'No records yet';
                }
            }

            loadRecords() {
                try {
                    const stored = localStorage.getItem('chordz-play-chord-records');
                    return stored ? JSON.parse(stored) : [];
                } catch (e) {
                    console.error('Failed to load records:', e);
                    return [];
                }
            }

            saveRecord(score) {
                const records = this.loadRecords();
                records.push({
                    score: score,
                    date: new Date().toISOString()
                });

                records.sort((a, b) => b.score - a.score);
                const topRecords = records.slice(0, 10);

                try {
                    localStorage.setItem('chordz-play-chord-records', JSON.stringify(topRecords));
                    this.displayBestScore();
                    return topRecords[0].score === score;
                } catch (e) {
                    console.error('Failed to save records:', e);
                    return false;
                }
            }

            pickRandomChord() {
                this.currentChord = ALL_CHORDS[Math.floor(Math.random() * ALL_CHORDS.length)];
                this.requiredNotes = getChordNotes(this.currentChord);
                this.detectedNotes.clear();

                document.getElementById('current-chord').textContent = this.currentChord;
                this.updateDetectedNotesDisplay();
            }

            updateDetectedNotesDisplay() {
                const container = document.getElementById('detected-notes-list');
                container.innerHTML = '';

                // Only show notes that have been detected
                this.detectedNotes.forEach(noteBase => {
                    const badge = document.createElement('div');
                    badge.style.cssText = `
                        padding: 8px 16px;
                        border-radius: 8px;
                        font-weight: bold;
                        font-size: 1.1rem;
                        background: var(--accent-happy);
                        color: white;
                        transition: all 0.3s ease;
                    `;
                    badge.textContent = noteBase;
                    container.appendChild(badge);
                });
            }

            async start() {
                try {
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 2048;
                    this.microphone = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.microphone.connect(this.analyser);

                    if (typeof Tone !== 'undefined') {
                        await Tone.start();
                    }

                    await this.requestWakeLock();

                    this.score = 0;
                    this.timeLeft = TRAINING_DURATION;
                    this.isRunning = true;

                    document.getElementById('start-btn').style.display = 'none';
                    document.getElementById('stop-btn').style.display = 'block';
                    document.getElementById('stats-display').style.display = 'block';
                    document.getElementById('chord-display').style.display = 'block';
                    document.getElementById('detected-notes-display').style.display = 'block';
                    document.getElementById('success-message').style.display = 'none';

                    this.updateDisplay();
                    this.pickRandomChord();

                    this.timerInterval = setInterval(() => {
                        this.timeLeft--;
                        this.updateDisplay();

                        if (this.timeLeft <= 0) {
                            this.finish();
                        }
                    }, 1000);

                    this.detect();

                } catch (error) {
                    alert('Error accessing microphone: ' + error.message);
                }
            }

            async stop() {
                this.isRunning = false;

                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }

                if (this.microphone) {
                    this.microphone.disconnect();
                    this.microphone = null;
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                if (this.audioContext && this.audioContext.state !== 'closed') {
                    await this.audioContext.close();
                    this.audioContext = null;
                }

                if (this.analyser) {
                    this.analyser = null;
                }

                await this.releaseWakeLock();

                this.lastFrequency = null;
                this.stableCount = 0;
                this.detectionCooldown = false;

                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('stop-btn').style.display = 'none';
                document.getElementById('stats-display').style.display = 'none';
                document.getElementById('chord-display').style.display = 'none';
                document.getElementById('detected-notes-display').style.display = 'none';
                document.getElementById('success-message').style.display = 'none';
            }

            async finish() {
                this.isRunning = false;

                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }

                if (this.microphone) {
                    this.microphone.disconnect();
                    this.microphone = null;
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                if (this.audioContext && this.audioContext.state !== 'closed') {
                    await this.audioContext.close();
                    this.audioContext = null;
                }

                if (this.analyser) {
                    this.analyser = null;
                }

                await this.releaseWakeLock();

                this.lastFrequency = null;
                this.stableCount = 0;
                this.detectionCooldown = false;

                const isNewRecord = this.saveRecord(this.score);

                document.getElementById('stop-btn').style.display = 'none';
                document.getElementById('stats-display').style.display = 'none';
                document.getElementById('chord-display').style.display = 'none';
                document.getElementById('detected-notes-display').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
                document.getElementById('final-score').textContent = `Final Score: ${this.score}`;

                if (isNewRecord) {
                    document.getElementById('new-record').style.display = 'block';
                }

                setTimeout(() => {
                    document.getElementById('start-btn').style.display = 'block';
                    document.getElementById('success-message').style.display = 'none';
                    document.getElementById('new-record').style.display = 'none';
                }, 5000);
            }

            updateDisplay() {
                document.getElementById('time-left').textContent = this.timeLeft;
                document.getElementById('score').textContent = this.score;
            }

            handleDetectedNote(detectedNote) {
                if (this.detectionCooldown) return;

                const noteBase = detectedNote.replace(/[0-9]/g, '');
                const requiredNoteBases = this.requiredNotes.map(n => n.replace(/[0-9]/g, ''));

                if (requiredNoteBases.includes(noteBase) && !this.detectedNotes.has(noteBase)) {
                    this.detectedNotes.add(noteBase);
                    this.updateDetectedNotesDisplay();

                    // Flash green
                    document.getElementById('chord-display').style.borderColor = 'var(--accent-happy)';
                    setTimeout(() => {
                        document.getElementById('chord-display').style.borderColor = 'var(--primary-color)';
                    }, 200);

                    // Check if all notes detected
                    if (this.detectedNotes.size === this.requiredNotes.length) {
                        this.score++;
                        this.updateDisplay();

                        // Success feedback
                        document.getElementById('chord-display').style.background = 'linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(5, 150, 105, 0.3))';
                        setTimeout(() => {
                            document.getElementById('chord-display').style.background = 'linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2))';
                        }, 300);

                        // Cooldown before next chord
                        this.detectionCooldown = true;
                        setTimeout(() => {
                            this.detectionCooldown = false;
                            this.pickRandomChord();
                        }, 800);
                    }
                }
            }
        }

        const trainer = new PlayChordTrainer();
    </script>
