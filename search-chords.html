<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chordz">
    <title>Chordz - Search Chords</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="main-nav">
            <a href="index.html" class="nav-link">🎤 Find Note</a>
            <a href="search-chords.html" class="nav-link active">🎵 Search Chords</a>
            <a href="play-chords.html" class="nav-link">🎹 Play Chords</a>
            <a href="guide.html" class="nav-link">📖 Guide</a>
        </nav>

        <header>
            <div class="header-icon">🎵</div>
            <h1>Search Chords</h1>
            <p class="subtitle">Find chord progressions by mood and key</p>
        </header>

        <div class="controls">
            <div class="input-section">
                <label for="note-selector" style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-primary);">Root Note:</label>
                <select id="note-selector" style="width: 100%; padding: 12px; font-size: 1rem; background: var(--background); color: var(--text-primary); border: 2px solid var(--primary-color); border-radius: 8px; cursor: pointer; height: 48px; box-sizing: border-box;">
                    <option value="all">All Keys</option>
                    <option value="C">C</option>
                    <option value="C#">C# / Db</option>
                    <option value="D">D</option>
                    <option value="D#">D# / Eb</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="F#">F# / Gb</option>
                    <option value="G">G</option>
                    <option value="G#">G# / Ab</option>
                    <option value="A">A</option>
                    <option value="A#">A# / Bb</option>
                    <option value="B">B</option>
                </select>
            </div>

            <div class="filter-section">
                <label style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-primary);">Filter by Mood:</label>
                <div class="mood-filters">
                    <button class="mood-filter active" data-mood="all">All</button>
                    <button class="mood-filter" data-mood="happy">Happy</button>
                    <button class="mood-filter" data-mood="uplifting">Uplifting</button>
                    <button class="mood-filter" data-mood="sad">Sad</button>
                    <button class="mood-filter" data-mood="melancholic">Melancholic</button>
                    <button class="mood-filter" data-mood="dreamy">Dreamy</button>
                    <button class="mood-filter" data-mood="unsettling">Unsettling</button>
                    <button class="mood-filter" data-mood="uncomfortable">Uncomfortable</button>
                </div>
            </div>
        </div>

        <div id="results" class="results">
            <!-- Chord progression cards will be dynamically inserted here -->
        </div>
    </div>

    <script src="music-theory.js"></script>
    <script src="chord-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
