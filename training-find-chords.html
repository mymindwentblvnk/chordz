<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chordz">
    <title>Find All Chords - Chordz</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="guide-styles.css">
    <script src="page-memory.js"></script>
    <script src="music-theory.js"></script>
    <style>
        /* Keyboard styles (from piano.css) */
        .kb-key {
            position: relative;
            cursor: default;
            user-select: none;
        }

        .kb-key.white {
            width: 50px;
            height: 200px;
            background: linear-gradient(to bottom, #ffffff 0%, #f0f0f0 100%);
            border: 2px solid #333;
            border-radius: 0 0 5px 5px;
            margin-right: -1px;
            z-index: 1;
        }

        .kb-key.black {
            width: 35px;
            height: 120px;
            background: linear-gradient(to bottom, #1a1a1a 0%, #000000 100%);
            border: 1px solid #000;
            border-radius: 0 0 4px 4px;
            position: absolute;
            z-index: 2;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Position black keys using data-key-index - scaled up from 40px to 50px white keys */
        #keyboard .kb-key.black[data-key-index="0"] { left: 32px; }  /* C# */
        #keyboard .kb-key.black[data-key-index="1"] { left: 82px; }  /* D# */
        #keyboard .kb-key.black[data-key-index="3"] { left: 182px; } /* F# */
        #keyboard .kb-key.black[data-key-index="4"] { left: 232px; } /* G# */
        #keyboard .kb-key.black[data-key-index="5"] { left: 282px; } /* A# */
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="training.html" class="nav-link active">🎮 Training</a>
        <a href="chord-progressions.html" class="nav-link">🎵 Chord Progressions</a>
        <a href="find-note.html" class="nav-link">🎤 Find Note</a>
        <a href="wiki.html" class="nav-link">📚 Wiki</a>
    </nav>

    <div class="guide-container">
        <div class="back-nav">
            <a href="training.html" class="back-link">← Back to Training</a>
        </div>

        <div class="guide-section" style="max-width: 900px; margin: 0 auto; padding: 10px 20px 20px 20px;">
            <header style="text-align: center; margin-bottom: 15px;">
                <div style="font-size: 2rem; margin-bottom: 5px;">🎹</div>
                <h1 style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0 0 5px 0; font-size: 1.5rem;">Find All Chords</h1>
                <p class="subtitle" style="font-size: 0.85rem; margin: 0;">Build all 7 natural chords in a given key</p>
            </header>

            <button id="start-btn" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 600; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 15px;">
                🎲 Start New Challenge
            </button>

            <!-- Challenge Display -->
            <div id="challenge-display" style="display: none; margin-bottom: 20px;">
                <div style="background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2)); padding: 20px; border-radius: 12px; text-align: center; border: 2px solid var(--primary-color);">
                    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 5px;">Find all chords in:</div>
                    <div style="font-size: 2rem; font-weight: bold; color: var(--primary-color);">
                        <span id="root-note"></span> <span id="mode"></span>
                    </div>
                </div>
            </div>

            <!-- Keyboard Reference -->
            <div id="keyboard-container" style="display: none; margin-bottom: 25px;">
                <div style="text-align: center; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-secondary);">Reference Keyboard</div>
                <div style="background: var(--background); padding: 30px; border-radius: 12px; overflow-x: auto;">
                    <div style="display: flex; justify-content: center;">
                        <div id="keyboard" style="position: relative; display: flex; height: 200px;"></div>
                    </div>
                </div>
            </div>

            <!-- Answer Table -->
            <div id="answer-table" style="display: none; margin-bottom: 20px;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: var(--surface-light);">
                            <th style="padding: 12px; text-align: left; border: 1px solid var(--surface);">Degree</th>
                            <th style="padding: 12px; text-align: left; border: 1px solid var(--surface);">Chord</th>
                            <th style="padding: 12px; text-align: left; border: 1px solid var(--surface);">Roman</th>
                            <th style="padding: 12px; text-align: left; border: 1px solid var(--surface);">Notes</th>
                        </tr>
                    </thead>
                    <tbody id="answer-rows">
                        <!-- Will be filled by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div id="button-container" style="display: none; gap: 10px;">
                <button id="check-btn" style="flex: 1; padding: 15px; font-size: 1.1rem; font-weight: 600; background: var(--accent-happy); color: white; border: none; border-radius: 10px; cursor: pointer;">
                    ✓ Check Answers
                </button>
                <button id="show-answers-btn" style="flex: 1; padding: 15px; font-size: 1.1rem; font-weight: 600; background: var(--surface); color: var(--text-primary); border: 2px solid var(--primary-color); border-radius: 10px; cursor: pointer;">
                    💡 Show Answers
                </button>
            </div>

            <!-- Results -->
            <div id="results" style="display: none; margin-top: 20px; padding: 20px; background: var(--surface-light); border-radius: 12px; text-align: center;">
                <div id="score-display" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;"></div>
                <div id="feedback" style="color: var(--text-secondary);"></div>
            </div>
        </div>
    </div>

    <script>
        // CHROMATIC_SCALE is defined in music-theory.js

        const MAJOR_PATTERN = {
            qualities: ['Major', 'minor', 'minor', 'Major', 'Major', 'minor', 'diminished'],
            romans: ['I', 'ii', 'iii', 'IV', 'V', 'vi', 'vii°']
        };

        const MINOR_PATTERN = {
            qualities: ['minor', 'diminished', 'Major', 'minor', 'minor', 'Major', 'Major'],
            romans: ['i', 'ii°', 'III', 'iv', 'v', 'VI', 'VII']
        };

        let currentKey = null;
        let currentMode = null;
        let currentScale = null;
        let correctAnswers = null;

        // Draw keyboard (simplified version from piano.js)
        function drawKeyboard() {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';

            // Render key group helper
            const renderKeyGroup = (noteName, hasSharp, index) => {
                // White key
                const whiteKey = document.createElement('div');
                whiteKey.className = 'kb-key white';
                whiteKey.setAttribute('data-key-index', index);
                keyboard.appendChild(whiteKey);

                // Black key (if exists)
                if (hasSharp) {
                    const blackKey = document.createElement('div');
                    blackKey.className = 'kb-key black';
                    blackKey.setAttribute('data-key-index', index);
                    keyboard.appendChild(blackKey);
                }
            };

            let keyIndex = 0;
            renderKeyGroup('C', true, keyIndex++);
            renderKeyGroup('D', true, keyIndex++);
            renderKeyGroup('E', false, keyIndex++);
            renderKeyGroup('F', true, keyIndex++);
            renderKeyGroup('G', true, keyIndex++);
            renderKeyGroup('A', true, keyIndex++);
            renderKeyGroup('B', false, keyIndex++);
            renderKeyGroup('C', false, keyIndex);
        }

        // Build scale
        function buildScale(root, mode) {
            const pattern = mode === 'Major'
                ? [2, 2, 1, 2, 2, 2, 1]  // W-W-H-W-W-W-H
                : [2, 1, 2, 2, 1, 2, 2]; // W-H-W-W-H-W-W

            const scale = [root];
            let currentIndex = CHROMATIC_SCALE.indexOf(root);

            for (let step of pattern) {
                currentIndex = (currentIndex + step) % 12;
                scale.push(CHROMATIC_SCALE[currentIndex]);
            }

            return scale.slice(0, 7); // Remove the octave
        }

        // Build chord from scale
        function buildChordFromScale(scale, degree) {
            const root = scale[degree];
            const third = scale[(degree + 2) % 7];
            const fifth = scale[(degree + 4) % 7];
            return [root, third, fifth];
        }

        // Get chord name
        function getChordName(notes, quality) {
            const root = notes[0];
            if (quality === 'Major') return root;
            if (quality === 'minor') return root + 'm';
            if (quality === 'diminished') return root + 'dim';
            return root;
        }

        // Start new challenge
        function startChallenge(specifiedRoot = null, specifiedMode = null) {
            // Use specified values or random
            currentKey = specifiedRoot || CHROMATIC_SCALE[Math.floor(Math.random() * CHROMATIC_SCALE.length)];
            currentMode = specifiedMode || (Math.random() > 0.5 ? 'Major' : 'Minor');

            // Update URL with current challenge
            const url = new URL(window.location);
            url.searchParams.set('root', currentKey);
            url.searchParams.set('mode', currentMode);
            window.history.pushState({}, '', url);

            // Build scale
            currentScale = buildScale(currentKey, currentMode);

            // Build correct answers
            const pattern = currentMode === 'Major' ? MAJOR_PATTERN : MINOR_PATTERN;
            correctAnswers = [];

            for (let i = 0; i < 7; i++) {
                const notes = buildChordFromScale(currentScale, i);
                const quality = pattern.qualities[i];
                const roman = pattern.romans[i];
                const chord = getChordName(notes, quality);

                correctAnswers.push({
                    degree: i + 1,
                    chord: chord,
                    roman: roman,
                    notes: notes.join(' - ')
                });
            }

            // Update UI
            document.getElementById('root-note').textContent = currentKey;
            document.getElementById('mode').textContent = currentMode;
            document.getElementById('challenge-display').style.display = 'block';
            document.getElementById('keyboard-container').style.display = 'block';
            document.getElementById('answer-table').style.display = 'block';
            document.getElementById('button-container').style.display = 'flex';
            document.getElementById('results').style.display = 'none';

            // Hide any previously shown correct answers
            document.querySelectorAll('.correct-answer').forEach(div => {
                div.style.display = 'none';
            });

            // Draw keyboard
            drawKeyboard();

            // Build answer table
            buildAnswerTable();
        }

        // Build answer table
        function buildAnswerTable() {
            const tbody = document.getElementById('answer-rows');
            tbody.innerHTML = '';

            const pattern = currentMode === 'Major' ? MAJOR_PATTERN : MINOR_PATTERN;

            for (let i = 0; i < 7; i++) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="padding: 10px; border: 1px solid var(--surface); font-weight: bold;">${i + 1}</td>
                    <td style="padding: 10px; border: 1px solid var(--surface);">
                        <input type="text"
                               class="answer-input chord-input"
                               data-row="${i}"
                               placeholder="e.g., C or Dm"
                               style="width: 100%; padding: 8px; background: var(--background); color: var(--text-primary); border: 2px solid var(--surface); border-radius: 6px;">
                        <div class="correct-answer" data-row="${i}" data-field="chord" style="display: none; margin-top: 5px; padding: 5px 8px; background: rgba(99, 102, 241, 0.1); border-radius: 4px; font-size: 0.85rem; color: var(--primary-color);"></div>
                    </td>
                    <td style="padding: 10px; border: 1px solid var(--surface);">
                        <input type="text"
                               class="answer-input roman-input"
                               data-row="${i}"
                               placeholder="e.g., ${pattern.romans[i]}"
                               style="width: 100%; padding: 8px; background: var(--background); color: var(--text-primary); border: 2px solid var(--surface); border-radius: 6px; font-family: monospace;">
                        <div class="correct-answer" data-row="${i}" data-field="roman" style="display: none; margin-top: 5px; padding: 5px 8px; background: rgba(99, 102, 241, 0.1); border-radius: 4px; font-size: 0.85rem; color: var(--primary-color);"></div>
                    </td>
                    <td style="padding: 10px; border: 1px solid var(--surface);">
                        <input type="text"
                               class="answer-input notes-input"
                               data-row="${i}"
                               placeholder="e.g., C - E - G"
                               style="width: 100%; padding: 8px; background: var(--background); color: var(--text-primary); border: 2px solid var(--surface); border-radius: 6px;">
                        <div class="correct-answer" data-row="${i}" data-field="notes" style="display: none; margin-top: 5px; padding: 5px 8px; background: rgba(99, 102, 241, 0.1); border-radius: 4px; font-size: 0.85rem; color: var(--primary-color);"></div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }

        // Normalize input for comparison
        function normalizeInput(input) {
            return input.trim().toLowerCase().replace(/\s+/g, '');
        }

        // Check answers
        function checkAnswers() {
            let correct = 0;
            let total = 7 * 3; // 7 rows, 3 fields each (Chord, Roman, Notes)

            // Hide correct answers if they were shown
            document.querySelectorAll('.correct-answer').forEach(div => {
                div.style.display = 'none';
            });

            document.querySelectorAll('.answer-input').forEach(input => {
                const row = parseInt(input.dataset.row);
                const correctAnswer = correctAnswers[row];

                let userAnswer = input.value.trim();
                let expectedAnswer = '';
                let isCorrect = false;

                if (input.classList.contains('roman-input')) {
                    expectedAnswer = correctAnswer.roman;
                    isCorrect = normalizeInput(userAnswer) === normalizeInput(expectedAnswer);
                } else if (input.classList.contains('chord-input')) {
                    expectedAnswer = correctAnswer.chord;
                    isCorrect = normalizeInput(userAnswer) === normalizeInput(expectedAnswer);
                } else if (input.classList.contains('notes-input')) {
                    expectedAnswer = correctAnswer.notes;
                    isCorrect = normalizeInput(userAnswer) === normalizeInput(expectedAnswer);
                }

                if (isCorrect) {
                    correct++;
                    input.style.borderColor = 'var(--accent-happy)';
                    input.style.background = 'rgba(16, 185, 129, 0.1)';
                } else {
                    input.style.borderColor = '#ef4444';
                    input.style.background = 'rgba(239, 68, 68, 0.1)';
                }
            });

            // Show results
            const percentage = Math.round((correct / total) * 100);
            document.getElementById('score-display').textContent = `Score: ${correct}/${total} (${percentage}%)`;

            let feedback = '';
            if (percentage === 100) {
                feedback = '🎉 Perfect! You got everything right!';
            } else if (percentage >= 80) {
                feedback = '🌟 Great job! Almost there!';
            } else if (percentage >= 60) {
                feedback = '👍 Good effort! Keep practicing!';
            } else {
                feedback = '💪 Keep going! Check the wiki for help with building chords.';
            }

            document.getElementById('feedback').textContent = feedback;
            document.getElementById('results').style.display = 'block';
        }

        // Show answers
        function showAnswers() {
            // Show all correct answer divs
            document.querySelectorAll('.correct-answer').forEach(answerDiv => {
                const row = parseInt(answerDiv.dataset.row);
                const field = answerDiv.dataset.field;
                const correctAnswer = correctAnswers[row];

                if (field === 'chord') {
                    answerDiv.textContent = `✓ ${correctAnswer.chord}`;
                } else if (field === 'roman') {
                    answerDiv.textContent = `✓ ${correctAnswer.roman}`;
                } else if (field === 'notes') {
                    answerDiv.textContent = `✓ ${correctAnswer.notes}`;
                }

                answerDiv.style.display = 'block';
            });

            document.getElementById('results').style.display = 'block';
            document.getElementById('score-display').textContent = 'Answers Shown';
            document.getElementById('feedback').textContent = 'Compare your answers with the correct ones above and try a new challenge!';
        }

        // Event listeners
        document.getElementById('start-btn').addEventListener('click', () => startChallenge());
        document.getElementById('check-btn').addEventListener('click', checkAnswers);
        document.getElementById('show-answers-btn').addEventListener('click', showAnswers);

        // Check for URL parameters and auto-start if present
        (function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const rootParam = urlParams.get('root');
            const modeParam = urlParams.get('mode');

            if (rootParam && modeParam) {
                // Validate parameters
                const validRoot = CHROMATIC_SCALE.includes(rootParam);
                const validMode = modeParam === 'Major' || modeParam === 'Minor';

                if (validRoot && validMode) {
                    startChallenge(rootParam, modeParam);
                }
            }
        })();
    </script>
</body>
</html>
