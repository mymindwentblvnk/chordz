<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chordz">
    <title>Chordz - Chord Progressions</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="page-memory.js"></script>
</head>
<body>
    <div class="container">
        <nav class="main-nav">
            <a href="training.html" class="nav-link">🎮 Training</a>
            <a href="chord-progressions.html" class="nav-link active">🎵 Chord Progressions</a>
            <a href="index.html" class="nav-link">🎤 Find Note</a>
            <a href="wiki.html" class="nav-link">📚 Wiki</a>
        </nav>

        <header>
            <div class="header-icon">🎵</div>
            <h1>Chord Progressions</h1>
            <p class="subtitle">Find chord progressions by mood and key</p>
        </header>

        <div class="controls">
            <div class="input-section">
                <label for="note-selector" style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-primary);">Root Note:</label>
                <select id="note-selector" style="width: 100%; padding: 12px; font-size: 1rem; background: var(--background); color: var(--text-primary); border: 2px solid var(--primary-color); border-radius: 8px; cursor: pointer; height: 48px; box-sizing: border-box;">
                    <option value="all">All Keys</option>
                    <option value="C">C</option>
                    <option value="C#">C# / Db</option>
                    <option value="D">D</option>
                    <option value="D#">D# / Eb</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="F#">F# / Gb</option>
                    <option value="G">G</option>
                    <option value="G#">G# / Ab</option>
                    <option value="A">A</option>
                    <option value="A#">A# / Bb</option>
                    <option value="B">B</option>
                </select>
            </div>

            <div class="filter-section">
                <div class="mood-filters">
                    <button class="mood-filter active" data-filter="all">All</button>
                    <button class="mood-filter" data-filter="major" data-type="scale">Major</button>
                    <button class="mood-filter" data-filter="minor" data-type="scale">Minor</button>
                    <button class="mood-filter" data-filter="borrowed" data-type="borrowed">Borrowed Chords</button>
                    <button class="mood-filter" data-filter="happy" data-type="mood">Happy</button>
                    <button class="mood-filter" data-filter="uplifting" data-type="mood">Uplifting</button>
                    <button class="mood-filter" data-filter="sad" data-type="mood">Sad</button>
                    <button class="mood-filter" data-filter="melancholic" data-type="mood">Melancholic</button>
                    <button class="mood-filter" data-filter="dreamy" data-type="mood">Dreamy</button>
                    <button class="mood-filter" data-filter="unsettling" data-type="mood">Unsettling</button>
                    <button class="mood-filter" data-filter="uncomfortable" data-type="mood">Uncomfortable</button>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button id="random-chord-btn" style="padding: 14px 32px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(99, 102, 241, 0.3);" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 12px rgba(99, 102, 241, 0.4)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(99, 102, 241, 0.3)'">
                    🎲 Random Chord Progression
                </button>
            </div>
        </div>

        <div id="results" class="results">
            <!-- Chord progression cards will be dynamically inserted here -->
        </div>
    </div>

    <script src="music-theory.js"></script>
    <script src="chord-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
