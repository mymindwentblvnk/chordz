<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chordz">
    <title>Chordz - Find Note</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="pitch-detector-styles.css">
    <script src="page-memory.js"></script>
</head>
<body>
    <div class="container">
        <nav class="main-nav">
            <a href="training.html" class="nav-link">🎮 Training</a>
            <a href="chord-progressions.html" class="nav-link">📖 Chord Progressions</a>
            <a href="find-note.html" class="nav-link active">🎤 Find Note</a>
            <a href="find-scale.html" class="nav-link">🎼 Find Scale</a>
            <a href="wiki.html" class="nav-link">📚 Wiki</a>
        </nav>

        <header>
            <div class="header-icon">🎤</div>
            <h1>Find Note</h1>
            <p class="subtitle">Find your root note, then explore chord progressions</p>
        </header>

        <div style="text-align: center; margin-bottom: 40px;">
            <button id="pitch-button" class="pitch-button">
                <span class="button-icon">🎵</span>
                <span class="button-text">Start Listening</span>
            </button>
            <div id="status-text" class="status-text"></div>
        </div>

        <div id="pitch-display" class="pitch-display" style="display: none;">
                <div class="note-container">
                    <div class="note-label">Detected Note</div>
                    <div id="note-name" class="note-name">—</div>
                    <div id="note-hint" class="note-hint-text"></div>
                    <div id="metrics-status" class="metrics-status"></div>
                </div>

                <div class="visual-indicator">
                    <canvas id="waveform" width="800" height="150"></canvas>
                </div>
            </div>

            <div id="pitch-error" class="pitch-error" style="display: none;"></div>

        <!-- Note History Section -->
        <div id="note-history-section" class="note-history-section" style="display: none;">
            <div class="history-header">
                <h3>📝 Detected Notes History</h3>
                <div class="history-controls">
                    <div class="sort-toggle">
                        <label class="sort-option">
                            <input type="radio" name="sort-mode" value="score" checked>
                            <span>By Score</span>
                        </label>
                        <label class="sort-option">
                            <input type="radio" name="sort-mode" value="order">
                            <span>By Order Played</span>
                        </label>
                    </div>
                    <button id="clear-history" class="clear-button">Clear History</button>
                </div>
            </div>
            <div id="note-history" class="note-history">
                <!-- History items will be added here -->
            </div>
        </div>
    </div>

    <script src="music-theory.js"></script>
    <script src="pitch-detector.js"></script>
    <script>
        // Find Note UI Implementation
        // PitchDetector class is loaded from pitch-detector.js

        // UI Controller
        let detector = null;
        let canvas = null;
        let ctx = null;

        // Note history tracking
        let noteHistory = [];
        let currentNote = null;
        let noteStartTime = null;
        let sortMode = 'score'; // 'score' or 'order'

        function init() {
            console.log('Initializing UI...');

            const pitchButton = document.getElementById('pitch-button');
            const pitchDisplay = document.getElementById('pitch-display');
            const pitchError = document.getElementById('pitch-error');
            const statusText = document.getElementById('status-text');
            const noteName = document.getElementById('note-name');
            const metricsStatus = document.getElementById('metrics-status');
            const noteHint = document.getElementById('note-hint');
            const noteHistorySection = document.getElementById('note-history-section');
            const clearHistoryButton = document.getElementById('clear-history');
            const sortModeRadios = document.querySelectorAll('input[name="sort-mode"]');

            canvas = document.getElementById('waveform');
            ctx = canvas.getContext('2d');

            // Clear history button handler
            clearHistoryButton.addEventListener('click', () => {
                noteHistory = [];
                currentNote = null;
                noteStartTime = null;
                updateNoteHistory();
            });

            // Sort mode change handler
            sortModeRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    sortMode = e.target.value;
                    updateNoteHistory();
                });
            });

            // Check browser support
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError('Your browser does not support microphone access. Please use Chrome, Firefox, or Edge.');
                pitchButton.disabled = true;
                return;
            }

            detector = new PitchDetector();

            detector.onPitchDetected = (result, buffer) => {
                drawWaveform(buffer);

                if (!result) {
                    // No note detected - end current note if one was playing
                    if (currentNote) {
                        endCurrentNote();
                    }
                    noteName.textContent = '—';
                    metricsStatus.textContent = '';
                    noteHint.textContent = 'Play a note...';
                    return;
                }

                const { frequency, note, octave, confidence } = result;
                const fullNote = `${note}${octave}`;

                // Track note changes
                if (!currentNote || currentNote.note !== fullNote) {
                    // End previous note
                    if (currentNote) {
                        endCurrentNote();
                    }
                    // Start new note
                    currentNote = {
                        note: fullNote,
                        noteName: note,
                        octave: octave,
                        frequency: frequency,
                        confidence: confidence,
                        confidenceSum: confidence,
                        confidenceCount: 1
                    };
                    noteStartTime = Date.now();
                } else {
                    // Same note continuing - update confidence average
                    currentNote.confidenceSum += confidence;
                    currentNote.confidenceCount++;
                    currentNote.frequency = frequency; // Update to latest frequency
                }

                if (noteName.textContent !== note) {
                    noteName.style.transform = 'scale(1.15)';
                    noteName.textContent = note;
                    setTimeout(() => {
                        noteName.style.transform = 'scale(1)';
                    }, 150);
                }

                const confidencePercent = Math.round(confidence * 100);
                metricsStatus.textContent = `${frequency} Hz • ${confidencePercent}% • Octave ${octave}`;

                noteHint.textContent = '';
            };

            pitchButton.addEventListener('click', async () => {
                if (detector.isRunning) {
                    // Save current note before stopping
                    if (currentNote) {
                        endCurrentNote();
                    }
                    detector.stop();
                    pitchButton.innerHTML = '<span class="button-icon">🎵</span><span class="button-text">Start Listening</span>';
                    pitchButton.classList.remove('listening');
                    pitchDisplay.style.display = 'none';
                    statusText.textContent = '';
                    hideError();
                } else {
                    try {
                        // Clear history when starting a new session
                        noteHistory = [];
                        currentNote = null;
                        noteStartTime = null;
                        updateNoteHistory();

                        hideError();
                        statusText.textContent = 'Requesting microphone access...';
                        pitchButton.disabled = true;

                        await detector.start();

                        pitchButton.innerHTML = '<span class="button-icon">⏹</span><span class="button-text">Stop Listening</span>';
                        pitchButton.classList.add('listening');
                        pitchButton.disabled = false;
                        pitchDisplay.style.display = 'block';
                        statusText.textContent = '🎧 Listening... Play or sing a note!';
                        statusText.style.color = 'var(--accent-happy)';
                    } catch (error) {
                        console.error('Error:', error);
                        pitchButton.disabled = false;
                        pitchButton.innerHTML = '<span class="button-icon">🎵</span><span class="button-text">Start Listening</span>';
                        statusText.textContent = '';

                        if (error.name === 'NotAllowedError') {
                            showError('❌ Microphone access denied. Please allow access and try again.');
                        } else if (error.name === 'NotFoundError') {
                            showError('❌ No microphone found. Please connect a microphone.');
                        } else {
                            showError('❌ Error: ' + error.message);
                        }
                    }
                }
            });

            // Handle page visibility changes (tab switch, app close on mobile)
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && detector && detector.isRunning) {
                    console.log('Page hidden, stopping detector');
                    if (currentNote) {
                        endCurrentNote();
                    }
                    detector.stop();
                    pitchButton.innerHTML = '<span class="button-icon">🎵</span><span class="button-text">Start Listening</span>';
                    pitchButton.classList.remove('listening');
                    pitchDisplay.style.display = 'none';
                    statusText.textContent = '';
                }
            });

            // Handle page unload (iOS Safari)
            window.addEventListener('pagehide', () => {
                if (detector && detector.isRunning) {
                    console.log('Page unloading, stopping detector');
                    if (currentNote) {
                        endCurrentNote();
                    }
                    detector.stop();
                }
            });

            // Handle before unload
            window.addEventListener('beforeunload', () => {
                if (detector && detector.isRunning) {
                    console.log('Page closing, stopping detector');
                    if (currentNote) {
                        endCurrentNote();
                    }
                    detector.stop();
                }
            });

            console.log('UI initialized');
        }

        function endCurrentNote() {
            if (!currentNote || !noteStartTime) return;

            const duration = Date.now() - noteStartTime;
            const avgConfidence = currentNote.confidenceSum / currentNote.confidenceCount;

            // Only record notes that lasted at least 100ms
            if (duration >= 100) {
                noteHistory.push({
                    note: currentNote.note,
                    noteName: currentNote.noteName,
                    octave: currentNote.octave,
                    frequency: Math.round(currentNote.frequency * 10) / 10,
                    duration: duration,
                    confidence: Math.round(avgConfidence * 100) / 100,
                    timestamp: Date.now(),
                    order: noteHistory.length // Track order of detection
                });

                updateNoteHistory();
            }

            currentNote = null;
            noteStartTime = null;
        }

        function updateNoteHistory() {
            const historySection = document.getElementById('note-history-section');
            const historyContainer = document.getElementById('note-history');

            if (noteHistory.length === 0) {
                historySection.style.display = 'none';
                return;
            }

            historySection.style.display = 'block';

            let sorted;

            if (sortMode === 'order') {
                // Show individual notes in chronological order
                sorted = [...noteHistory].map(item => ({
                    noteName: item.noteName,
                    octaves: [item.octave],
                    duration: item.duration,
                    confidence: item.confidence,
                    count: 1,
                    order: item.order
                }));
                // Sort by order (chronological)
                sorted.sort((a, b) => a.order - b.order);
            } else {
                // Group by note only (ignore octave)
                const grouped = {};
                noteHistory.forEach(item => {
                    const key = item.noteName;
                    if (!grouped[key]) {
                        grouped[key] = {
                            noteName: item.noteName,
                            octaves: new Set(),
                            totalDuration: 0,
                            totalConfidence: 0,
                            count: 0,
                            frequencies: [],
                            firstOrder: item.order // Track first occurrence
                        };
                    }
                    grouped[key].octaves.add(item.octave);
                    grouped[key].totalDuration += item.duration;
                    grouped[key].totalConfidence += item.confidence;
                    grouped[key].count += 1;
                    grouped[key].frequencies.push(item.frequency);
                    grouped[key].firstOrder = Math.min(grouped[key].firstOrder, item.order);
                });

                // Convert to array and calculate averages
                const aggregated = Object.values(grouped).map(group => {
                    // Calculate average confidence and clamp to 0-1
                    const avgConfidence = group.totalConfidence / group.count;
                    const clampedConfidence = Math.min(1.0, Math.max(0.0, avgConfidence));

                    return {
                        noteName: group.noteName,
                        octaves: Array.from(group.octaves).sort((a, b) => a - b),
                        duration: group.totalDuration,
                        confidence: clampedConfidence,
                        avgFrequency: group.frequencies.reduce((a, b) => a + b, 0) / group.frequencies.length,
                        count: group.count,
                        firstOrder: group.firstOrder
                    };
                });

                // Sort by confidence * duration (higher = better)
                sorted = aggregated.sort((a, b) => {
                    const scoreA = a.confidence * a.duration;
                    const scoreB = b.confidence * b.duration;
                    return scoreB - scoreA;
                });
            }

            // Generate table HTML
            const tableRows = sorted.map((item, index) => {
                const durationSec = (item.duration / 1000).toFixed(2);
                const confidencePercent = Math.round(item.confidence * 100);
                const score = Math.round(item.confidence * item.duration);

                // Format octaves display
                const octavesDisplay = item.octaves.length === 1
                    ? item.octaves[0]
                    : item.octaves.join(', ');

                // Add special class for top 3 (only in score mode)
                let rowClass = 'history-row';
                if (sortMode === 'score') {
                    if (index === 0) rowClass += ' top-1';
                    else if (index === 1) rowClass += ' top-2';
                    else if (index === 2) rowClass += ' top-3';
                }

                if (sortMode === 'order') {
                    // Simplified view for chronological order
                    return `
                        <tr class="${rowClass}">
                            <td class="rank-cell">${index + 1}</td>
                            <td class="note-cell">
                                <span class="note-name-cell">${item.noteName}</span>
                            </td>
                            <td class="octave-cell">${octavesDisplay}</td>
                            <td class="duration-cell">${durationSec}s</td>
                            <td class="confidence-cell">
                                <div class="confidence-bar-cell">
                                    <div class="confidence-fill" style="width: ${confidencePercent}%"></div>
                                    <span class="confidence-text">${confidencePercent}%</span>
                                </div>
                            </td>
                            <td class="action-cell">
                                <a href="search-chords.html?note=${encodeURIComponent(item.noteName)}" class="action-button">
                                    Find Chords →
                                </a>
                            </td>
                        </tr>
                    `;
                } else {
                    // Full view for score-based sorting
                    return `
                        <tr class="${rowClass}">
                            <td class="rank-cell">#${index + 1}</td>
                            <td class="note-cell">
                                <span class="note-name-cell">${item.noteName}</span>
                            </td>
                            <td class="octave-cell">${octavesDisplay}</td>
                            <td class="duration-cell">${durationSec}s</td>
                            <td class="confidence-cell">
                                <div class="confidence-bar-cell">
                                    <div class="confidence-fill" style="width: ${confidencePercent}%"></div>
                                    <span class="confidence-text">${confidencePercent}%</span>
                                </div>
                            </td>
                            <td class="count-cell">${item.count}×</td>
                            <td class="score-cell">${score}</td>
                            <td class="action-cell">
                                <a href="search-chords.html?note=${encodeURIComponent(item.noteName)}" class="action-button">
                                    Find Chords →
                                </a>
                            </td>
                        </tr>
                    `;
                }
            }).join('');

            // Generate table headers based on sort mode
            const headers = sortMode === 'order'
                ? `<th>Order</th><th>Note</th><th>Octave</th><th>Duration</th><th>Confidence</th><th>Action</th>`
                : `<th>Rank</th><th>Note</th><th>Octave(s)</th><th>Total Duration</th><th>Avg Confidence</th><th>Times Played</th><th>Score</th><th>Action</th>`;

            historyContainer.innerHTML = `
                <table class="history-table">
                    <thead>
                        <tr>
                            ${headers}
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            `;
        }

        function drawWaveform(buffer) {
            if (!ctx) return;

            ctx.fillStyle = 'rgba(15, 23, 42, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#6366f1';
            ctx.beginPath();

            const sliceWidth = canvas.width / buffer.length;
            let x = 0;

            for (let i = 0; i < buffer.length; i++) {
                const v = buffer[i];
                const y = (v + 1) * canvas.height / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.stroke();
        }

        function showError(message) {
            const errorEl = document.getElementById('pitch-error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function hideError() {
            const errorEl = document.getElementById('pitch-error');
            errorEl.style.display = 'none';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
