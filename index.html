<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chordz">
    <title>Chordz</title>
    <link rel="manifest" href="manifest.json">
    <script>
        // Router: redirect to last visited page or training.html as fallback
        (function() {
            const LAST_PAGE_KEY = 'chordz-last-page';

            try {
                const lastPage = localStorage.getItem(LAST_PAGE_KEY);

                // Redirect to last visited page, or training.html if none
                if (lastPage && lastPage !== 'index.html' && lastPage !== '') {
                    window.location.href = lastPage;
                } else {
                    window.location.href = 'training.html';
                }
            } catch (e) {
                // If localStorage fails, just go to training
                window.location.href = 'training.html';
            }
        })();
    </script>
</head>
<body>
    <!-- This page immediately redirects, so body is empty -->
</body>
</html>
