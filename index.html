<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Note - Find Your Note</title>
    <link rel="stylesheet" href="pitch-detector-styles.css">
</head>
<body>
    <div class="container">
        <nav class="main-nav">
            <a href="index.html" class="nav-link active">🎤 Find Note</a>
            <a href="chord-generator.html" class="nav-link">🎵 Chord Progressions</a>
            <a href="chord-builder.html" class="nav-link">🎹 Play Chords</a>
            <a href="guide.html" class="nav-link">📖 Guide</a>
        </nav>

        <header>
            <div class="header-icon">🎤</div>
            <h1>Find Note</h1>
            <p class="subtitle">Find your root note, then explore chord progressions</p>
        </header>

        <div style="text-align: center; margin-bottom: 40px;">
            <button id="pitch-button" class="pitch-button">
                <span class="button-icon">🎵</span>
                <span class="button-text">Start Listening</span>
            </button>
            <div id="status-text" class="status-text"></div>
        </div>

        <div id="pitch-display" class="pitch-display" style="display: none;">
                <div class="note-container">
                    <div class="note-label">Detected Note</div>
                    <div id="note-name" class="note-name">—</div>
                    <div id="note-hint" class="note-hint-text"></div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-icon">📊</div>
                        <div class="metric-label">Frequency</div>
                        <div id="frequency-display" class="metric-value">— Hz</div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-icon">🎯</div>
                        <div class="metric-label">Confidence</div>
                        <div class="confidence-container">
                            <div class="confidence-bar-bg">
                                <div id="confidence-bar" class="confidence-bar" style="width: 0%"></div>
                            </div>
                            <div id="confidence-text" class="metric-value">0%</div>
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-icon">🎼</div>
                        <div class="metric-label">Octave</div>
                        <div id="octave-display" class="metric-value">—</div>
                    </div>
                </div>

                <div class="visual-indicator">
                    <canvas id="waveform" width="800" height="150"></canvas>
                </div>
            </div>

            <div id="pitch-error" class="pitch-error" style="display: none;"></div>

        <!-- Note History Section -->
        <div id="note-history-section" class="note-history-section" style="display: none;">
            <div class="history-header">
                <h3>📝 Detected Notes History</h3>
                <div class="history-controls">
                    <div class="sort-toggle">
                        <label class="sort-option">
                            <input type="radio" name="sort-mode" value="score" checked>
                            <span>By Score</span>
                        </label>
                        <label class="sort-option">
                            <input type="radio" name="sort-mode" value="order">
                            <span>By Order Played</span>
                        </label>
                    </div>
                    <button id="clear-history" class="clear-button">Clear History</button>
                </div>
            </div>
            <div id="note-history" class="note-history">
                <!-- History items will be added here -->
            </div>
        </div>
    </div>

    <script src="music-theory.js"></script>
    <script>
        // Find Note Implementation
        class PitchDetector {
            constructor() {
                this.audioContext = null;
                this.analyser = null;
                this.microphone = null;
                this.mediaStream = null;
                this.animationFrameId = null;
                this.isRunning = false;
                this.bufferSize = 2048;
                this.sampleRate = null;
                this.minFrequency = 80;
                this.maxFrequency = 1200;
                this.minConfidence = 0.85;
                this.onPitchDetected = null;

                console.log('PitchDetector initialized');
            }

            async start() {
                console.log('Starting pitch detector...');
                if (this.isRunning) {
                    console.log('Already running');
                    return;
                }

                try {
                    console.log('Requesting microphone access...');
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            autoGainControl: false,
                            noiseSuppression: false,
                            latency: 0
                        }
                    });
                    console.log('Microphone access granted');

                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.sampleRate = this.audioContext.sampleRate;
                    console.log('Audio context created, sample rate:', this.sampleRate);

                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = this.bufferSize * 2;
                    this.analyser.smoothingTimeConstant = 0;

                    this.microphone = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.microphone.connect(this.analyser);
                    console.log('Audio pipeline connected');

                    this.isRunning = true;
                    this.detect();
                } catch (error) {
                    console.error('Error starting pitch detector:', error);
                    this.cleanup();
                    throw error;
                }
            }

            stop() {
                console.log('Stopping pitch detector...');
                this.cleanup();
            }

            cleanup() {
                this.isRunning = false;
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }
                if (this.microphone) {
                    this.microphone.disconnect();
                    this.microphone = null;
                }
                if (this.analyser) {
                    this.analyser = null;
                }
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => {
                        track.stop();
                        console.log('Stopped media track');
                    });
                    this.mediaStream = null;
                }
                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }
                console.log('Cleanup complete');
            }

            detect() {
                if (!this.isRunning) return;

                const buffer = new Float32Array(this.bufferSize);
                this.analyser.getFloatTimeDomainData(buffer);

                const result = this.detectPitch(buffer);

                if (this.onPitchDetected) {
                    this.onPitchDetected(result, buffer);
                }

                this.animationFrameId = requestAnimationFrame(() => this.detect());
            }

            detectPitch(buffer) {
                const rms = this.calculateRMS(buffer);
                if (rms < 0.005) {
                    return null;
                }

                const autocorrelation = this.autoCorrelate(buffer);
                if (!autocorrelation) {
                    return null;
                }

                const { frequency, confidence } = autocorrelation;

                if (frequency < this.minFrequency ||
                    frequency > this.maxFrequency ||
                    confidence < this.minConfidence) {
                    return null;
                }

                const note = this.frequencyToNote(frequency);
                const octave = this.getOctave(frequency);

                return {
                    frequency: Math.round(frequency * 10) / 10,
                    note: note,
                    octave: octave,
                    confidence: Math.round(confidence * 100) / 100,
                    rms: rms
                };
            }

            calculateRMS(buffer) {
                let sum = 0;
                for (let i = 0; i < buffer.length; i++) {
                    sum += buffer[i] * buffer[i];
                }
                return Math.sqrt(sum / buffer.length);
            }

            autoCorrelate(buffer) {
                const size = buffer.length;
                const maxSamples = Math.floor(size / 2);
                const correlations = new Array(maxSamples);

                for (let lag = 0; lag < maxSamples; lag++) {
                    let sum = 0;
                    for (let i = 0; i < maxSamples; i++) {
                        sum += buffer[i] * buffer[i + lag];
                    }
                    correlations[lag] = sum;
                }

                const normalization = correlations[0];
                if (normalization === 0) return null;

                for (let i = 0; i < correlations.length; i++) {
                    correlations[i] /= normalization;
                }

                const minLag = Math.floor(this.sampleRate / this.maxFrequency);
                const maxLag = Math.floor(this.sampleRate / this.minFrequency);

                let i = minLag;
                while (i < maxLag && correlations[i] > 0.5) i++;
                while (i < maxLag && correlations[i] <= 0.5) i++;

                let peakLag = -1;
                let peakValue = -1;
                for (; i < maxLag; i++) {
                    if (correlations[i] > peakValue) {
                        peakValue = correlations[i];
                        peakLag = i;
                    }
                }

                if (peakLag === -1 || peakValue < 0.5) return null;

                let refinedLag = peakLag;
                if (peakLag > 0 && peakLag < correlations.length - 1) {
                    const alpha = correlations[peakLag - 1];
                    const beta = correlations[peakLag];
                    const gamma = correlations[peakLag + 1];
                    refinedLag = peakLag + (alpha - gamma) / (2 * (2 * beta - gamma - alpha));
                }

                const frequency = this.sampleRate / refinedLag;
                // Clamp confidence to 0-1 range (can exceed due to floating point)
                const clampedConfidence = Math.min(1.0, Math.max(0.0, peakValue));
                return { frequency, confidence: clampedConfidence };
            }

            frequencyToNote(frequency) {
                const A4 = 440;
                const A4_INDEX = 9;
                const semitones = 12 * Math.log2(frequency / A4);
                const roundedSemitones = Math.round(semitones);
                const noteIndex = (A4_INDEX + roundedSemitones) % 12;
                const positiveIndex = noteIndex < 0 ? noteIndex + 12 : noteIndex;
                return CHROMATIC_SCALE[positiveIndex];
            }

            getOctave(frequency) {
                const A4 = 440;
                const semitones = 12 * Math.log2(frequency / A4);
                const octave = 4 + Math.floor((semitones + 9) / 12);
                return octave;
            }
        }

        // UI Controller
        let detector = null;
        let canvas = null;
        let ctx = null;

        // Note history tracking
        let noteHistory = [];
        let currentNote = null;
        let noteStartTime = null;
        let sortMode = 'score'; // 'score' or 'order'

        function init() {
            console.log('Initializing UI...');

            const pitchButton = document.getElementById('pitch-button');
            const pitchDisplay = document.getElementById('pitch-display');
            const pitchError = document.getElementById('pitch-error');
            const statusText = document.getElementById('status-text');
            const noteName = document.getElementById('note-name');
            const frequencyDisplay = document.getElementById('frequency-display');
            const confidenceBar = document.getElementById('confidence-bar');
            const confidenceText = document.getElementById('confidence-text');
            const octaveDisplay = document.getElementById('octave-display');
            const noteHint = document.getElementById('note-hint');
            const noteHistorySection = document.getElementById('note-history-section');
            const clearHistoryButton = document.getElementById('clear-history');
            const sortModeRadios = document.querySelectorAll('input[name="sort-mode"]');

            canvas = document.getElementById('waveform');
            ctx = canvas.getContext('2d');

            // Clear history button handler
            clearHistoryButton.addEventListener('click', () => {
                noteHistory = [];
                currentNote = null;
                noteStartTime = null;
                updateNoteHistory();
            });

            // Sort mode change handler
            sortModeRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    sortMode = e.target.value;
                    updateNoteHistory();
                });
            });

            // Check browser support
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError('Your browser does not support microphone access. Please use Chrome, Firefox, or Edge.');
                pitchButton.disabled = true;
                return;
            }

            detector = new PitchDetector();

            detector.onPitchDetected = (result, buffer) => {
                drawWaveform(buffer);

                if (!result) {
                    // No note detected - end current note if one was playing
                    if (currentNote) {
                        endCurrentNote();
                    }
                    noteName.textContent = '—';
                    frequencyDisplay.textContent = '— Hz';
                    confidenceBar.style.width = '0%';
                    confidenceText.textContent = '0%';
                    octaveDisplay.textContent = '—';
                    noteHint.textContent = 'Play a note...';
                    return;
                }

                const { frequency, note, octave, confidence } = result;
                const fullNote = `${note}${octave}`;

                // Track note changes
                if (!currentNote || currentNote.note !== fullNote) {
                    // End previous note
                    if (currentNote) {
                        endCurrentNote();
                    }
                    // Start new note
                    currentNote = {
                        note: fullNote,
                        noteName: note,
                        octave: octave,
                        frequency: frequency,
                        confidence: confidence,
                        confidenceSum: confidence,
                        confidenceCount: 1
                    };
                    noteStartTime = Date.now();
                } else {
                    // Same note continuing - update confidence average
                    currentNote.confidenceSum += confidence;
                    currentNote.confidenceCount++;
                    currentNote.frequency = frequency; // Update to latest frequency
                }

                if (noteName.textContent !== note) {
                    noteName.style.transform = 'scale(1.15)';
                    noteName.textContent = note;
                    setTimeout(() => {
                        noteName.style.transform = 'scale(1)';
                    }, 150);
                }

                frequencyDisplay.textContent = `${frequency} Hz`;
                octaveDisplay.textContent = `Octave ${octave}`;

                const confidencePercent = Math.round(confidence * 100);
                confidenceBar.style.width = `${confidencePercent}%`;
                confidenceText.textContent = `${confidencePercent}%`;

                noteHint.textContent = `${note}${octave} - Perfect for ${note} major or ${note} minor!`;
            };

            pitchButton.addEventListener('click', async () => {
                if (detector.isRunning) {
                    // Save current note before stopping
                    if (currentNote) {
                        endCurrentNote();
                    }
                    detector.stop();
                    pitchButton.innerHTML = '<span class="button-icon">🎵</span><span class="button-text">Start Listening</span>';
                    pitchButton.classList.remove('listening');
                    pitchDisplay.style.display = 'none';
                    statusText.textContent = '';
                    hideError();
                } else {
                    try {
                        // Clear history when starting a new session
                        noteHistory = [];
                        currentNote = null;
                        noteStartTime = null;
                        updateNoteHistory();

                        hideError();
                        statusText.textContent = 'Requesting microphone access...';
                        pitchButton.disabled = true;

                        await detector.start();

                        pitchButton.innerHTML = '<span class="button-icon">⏹</span><span class="button-text">Stop Listening</span>';
                        pitchButton.classList.add('listening');
                        pitchButton.disabled = false;
                        pitchDisplay.style.display = 'block';
                        statusText.textContent = '🎧 Listening... Play or sing a note!';
                        statusText.style.color = 'var(--accent-happy)';
                    } catch (error) {
                        console.error('Error:', error);
                        pitchButton.disabled = false;
                        pitchButton.innerHTML = '<span class="button-icon">🎵</span><span class="button-text">Start Listening</span>';
                        statusText.textContent = '';

                        if (error.name === 'NotAllowedError') {
                            showError('❌ Microphone access denied. Please allow access and try again.');
                        } else if (error.name === 'NotFoundError') {
                            showError('❌ No microphone found. Please connect a microphone.');
                        } else {
                            showError('❌ Error: ' + error.message);
                        }
                    }
                }
            });

            // Handle page visibility changes (tab switch, app close on mobile)
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && detector && detector.isRunning) {
                    console.log('Page hidden, stopping detector');
                    if (currentNote) {
                        endCurrentNote();
                    }
                    detector.stop();
                    pitchButton.innerHTML = '<span class="button-icon">🎵</span><span class="button-text">Start Listening</span>';
                    pitchButton.classList.remove('listening');
                    pitchDisplay.style.display = 'none';
                    statusText.textContent = '';
                }
            });

            // Handle page unload (iOS Safari)
            window.addEventListener('pagehide', () => {
                if (detector && detector.isRunning) {
                    console.log('Page unloading, stopping detector');
                    if (currentNote) {
                        endCurrentNote();
                    }
                    detector.stop();
                }
            });

            // Handle before unload
            window.addEventListener('beforeunload', () => {
                if (detector && detector.isRunning) {
                    console.log('Page closing, stopping detector');
                    if (currentNote) {
                        endCurrentNote();
                    }
                    detector.stop();
                }
            });

            console.log('UI initialized');
        }

        function endCurrentNote() {
            if (!currentNote || !noteStartTime) return;

            const duration = Date.now() - noteStartTime;
            const avgConfidence = currentNote.confidenceSum / currentNote.confidenceCount;

            // Only record notes that lasted at least 100ms
            if (duration >= 100) {
                noteHistory.push({
                    note: currentNote.note,
                    noteName: currentNote.noteName,
                    octave: currentNote.octave,
                    frequency: Math.round(currentNote.frequency * 10) / 10,
                    duration: duration,
                    confidence: Math.round(avgConfidence * 100) / 100,
                    timestamp: Date.now(),
                    order: noteHistory.length // Track order of detection
                });

                updateNoteHistory();
            }

            currentNote = null;
            noteStartTime = null;
        }

        function updateNoteHistory() {
            const historySection = document.getElementById('note-history-section');
            const historyContainer = document.getElementById('note-history');

            if (noteHistory.length === 0) {
                historySection.style.display = 'none';
                return;
            }

            historySection.style.display = 'block';

            let sorted;

            if (sortMode === 'order') {
                // Show individual notes in chronological order
                sorted = [...noteHistory].map(item => ({
                    noteName: item.noteName,
                    octaves: [item.octave],
                    duration: item.duration,
                    confidence: item.confidence,
                    count: 1,
                    order: item.order
                }));
                // Sort by order (chronological)
                sorted.sort((a, b) => a.order - b.order);
            } else {
                // Group by note only (ignore octave)
                const grouped = {};
                noteHistory.forEach(item => {
                    const key = item.noteName;
                    if (!grouped[key]) {
                        grouped[key] = {
                            noteName: item.noteName,
                            octaves: new Set(),
                            totalDuration: 0,
                            totalConfidence: 0,
                            count: 0,
                            frequencies: [],
                            firstOrder: item.order // Track first occurrence
                        };
                    }
                    grouped[key].octaves.add(item.octave);
                    grouped[key].totalDuration += item.duration;
                    grouped[key].totalConfidence += item.confidence;
                    grouped[key].count += 1;
                    grouped[key].frequencies.push(item.frequency);
                    grouped[key].firstOrder = Math.min(grouped[key].firstOrder, item.order);
                });

                // Convert to array and calculate averages
                const aggregated = Object.values(grouped).map(group => {
                    // Calculate average confidence and clamp to 0-1
                    const avgConfidence = group.totalConfidence / group.count;
                    const clampedConfidence = Math.min(1.0, Math.max(0.0, avgConfidence));

                    return {
                        noteName: group.noteName,
                        octaves: Array.from(group.octaves).sort((a, b) => a - b),
                        duration: group.totalDuration,
                        confidence: clampedConfidence,
                        avgFrequency: group.frequencies.reduce((a, b) => a + b, 0) / group.frequencies.length,
                        count: group.count,
                        firstOrder: group.firstOrder
                    };
                });

                // Sort by confidence * duration (higher = better)
                sorted = aggregated.sort((a, b) => {
                    const scoreA = a.confidence * a.duration;
                    const scoreB = b.confidence * b.duration;
                    return scoreB - scoreA;
                });
            }

            // Generate table HTML
            const tableRows = sorted.map((item, index) => {
                const durationSec = (item.duration / 1000).toFixed(2);
                const confidencePercent = Math.round(item.confidence * 100);
                const score = Math.round(item.confidence * item.duration);

                // Format octaves display
                const octavesDisplay = item.octaves.length === 1
                    ? item.octaves[0]
                    : item.octaves.join(', ');

                // Add special class for top 3 (only in score mode)
                let rowClass = 'history-row';
                if (sortMode === 'score') {
                    if (index === 0) rowClass += ' top-1';
                    else if (index === 1) rowClass += ' top-2';
                    else if (index === 2) rowClass += ' top-3';
                }

                if (sortMode === 'order') {
                    // Simplified view for chronological order
                    return `
                        <tr class="${rowClass}">
                            <td class="rank-cell">${index + 1}</td>
                            <td class="note-cell">
                                <span class="note-name-cell">${item.noteName}</span>
                            </td>
                            <td class="octave-cell">${octavesDisplay}</td>
                            <td class="duration-cell">${durationSec}s</td>
                            <td class="confidence-cell">
                                <div class="confidence-bar-cell">
                                    <div class="confidence-fill" style="width: ${confidencePercent}%"></div>
                                    <span class="confidence-text">${confidencePercent}%</span>
                                </div>
                            </td>
                            <td class="action-cell">
                                <a href="chord-generator.html?note=${encodeURIComponent(item.noteName)}" class="action-button">
                                    Find Chords →
                                </a>
                            </td>
                        </tr>
                    `;
                } else {
                    // Full view for score-based sorting
                    return `
                        <tr class="${rowClass}">
                            <td class="rank-cell">#${index + 1}</td>
                            <td class="note-cell">
                                <span class="note-name-cell">${item.noteName}</span>
                            </td>
                            <td class="octave-cell">${octavesDisplay}</td>
                            <td class="duration-cell">${durationSec}s</td>
                            <td class="confidence-cell">
                                <div class="confidence-bar-cell">
                                    <div class="confidence-fill" style="width: ${confidencePercent}%"></div>
                                    <span class="confidence-text">${confidencePercent}%</span>
                                </div>
                            </td>
                            <td class="count-cell">${item.count}×</td>
                            <td class="score-cell">${score}</td>
                            <td class="action-cell">
                                <a href="chord-generator.html?note=${encodeURIComponent(item.noteName)}" class="action-button">
                                    Find Chords →
                                </a>
                            </td>
                        </tr>
                    `;
                }
            }).join('');

            // Generate table headers based on sort mode
            const headers = sortMode === 'order'
                ? `<th>Order</th><th>Note</th><th>Octave</th><th>Duration</th><th>Confidence</th><th>Action</th>`
                : `<th>Rank</th><th>Note</th><th>Octave(s)</th><th>Total Duration</th><th>Avg Confidence</th><th>Times Played</th><th>Score</th><th>Action</th>`;

            historyContainer.innerHTML = `
                <table class="history-table">
                    <thead>
                        <tr>
                            ${headers}
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            `;
        }

        function drawWaveform(buffer) {
            if (!ctx) return;

            ctx.fillStyle = 'rgba(15, 23, 42, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#6366f1';
            ctx.beginPath();

            const sliceWidth = canvas.width / buffer.length;
            let x = 0;

            for (let i = 0; i < buffer.length; i++) {
                const v = buffer[i];
                const y = (v + 1) * canvas.height / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.stroke();
        }

        function showError(message) {
            const errorEl = document.getElementById('pitch-error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function hideError() {
            const errorEl = document.getElementById('pitch-error');
            errorEl.style.display = 'none';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
