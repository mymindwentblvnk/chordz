    <div class="guide-container">

        <div class="guide-section" style="max-width: 600px; margin: 0 auto; padding: 10px 20px 20px 20px;">
            <header style="text-align: center; margin-bottom: 15px;">
                <div style="font-size: 2rem; margin-bottom: 5px;">🔄</div>
                <h1 style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0 0 5px 0; font-size: 1.5rem;">Chord Inversions</h1>
                <p class="subtitle" style="font-size: 0.85rem; margin: 0;">Master all inversions by playing sequences as fast as you can</p>
            </header>

            <!-- Best Time Display & Notation Toggle -->
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(99, 102, 241, 0.1); border-left: 4px solid var(--primary-color); border-radius: 6px; margin-bottom: 12px; font-size: 0.85rem; gap: 15px;">
                <div>
                    <span style="color: var(--text-secondary);">🏆 Best:</span>
                    <strong id="best-time-value" style="color: var(--primary-color); margin-left: 8px;">-</strong>
                    <span style="color: var(--text-secondary); margin-left: 8px; font-size: 0.8rem;" id="best-time-date">No records yet</span>

                        English

            <select id="training-chord" style="width: 100%; padding: 12px; font-size: 1rem; background: var(--background); color: var(--text-primary); border: 2px solid var(--primary-color); border-radius: 10px; cursor: pointer; margin-bottom: 12px;">
                <option value="C">C Major</option>
                <option value="D">D Major</option>
                <option value="E">E Major</option>
                <option value="F">F Major</option>
                <option value="G">G Major</option>
                <option value="A">A Major</option>
                <option value="B">B Major</option>
                <option value="Am">A Minor</option>
                <option value="Bm">B Minor</option>
                <option value="Cm">C Minor</option>
                <option value="Dm">D Minor</option>
                <option value="Em">E Minor</option>
                <option value="Fm">F Minor</option>
                <option value="Gm">G Minor</option>
            </select>

            <button id="start-training" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 600; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 15px;">
                🎤 Start Training
            </button>

            <button id="stop-training" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 600; background: #ef4444; color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 15px; display: none;">
                ⏹ Stop Training
            </button>

            <!-- Countdown Display -->
            <div id="countdown-display" style="display: none; margin-bottom: 12px; padding: 12px; background: var(--surface); border-radius: 8px; text-align: center;">
                <div style="font-size: 1.4rem; font-weight: bold; color: var(--primary-color); font-family: 'Courier New', monospace;">3</div>
            </div>

            <!-- Stats Display -->
            <div id="current-stats" style="display: none; margin-bottom: 12px; padding: 12px; background: var(--surface); border-radius: 8px; text-align: center;">

                    <div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">Time</div>
                        <div id="timer-display" style="font-size: 1.4rem; font-weight: bold; color: var(--primary-color); font-family: 'Courier New', monospace;">0:00</div>
                    </div>
                </div>
            </div>

            <!-- Sequence Boxes -->
            <div id="sequence-boxes" style="display: flex; flex-direction: column; gap: 10px;">
                <!-- Boxes will be generated dynamically -->
            </div>

            <div id="success-message" style="display: none; text-align: center; padding: 30px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2)); border-radius: 15px; border: 3px solid var(--accent-happy); margin-top: 30px;">
                <div style="font-size: 4rem; margin-bottom: 15px;">🎉</div>
                <h2 style="color: var(--accent-happy); margin: 0 0 10px 0;">Perfect!</h2>
                <p style="font-size: 1.2rem; color: var(--text-primary); margin: 0;">You've mastered all inversions!</p>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
    <script src="pitch-detector.js"></script>
    <script>
        // Notation conversion
        const NOTATION_STORAGE_KEY = 'chordz-notation-preference';

        const NOTATION_MAP = {
            'english': {
                'C': 'C',
                'C#': 'C#',
                'D': 'D',
                'D#': 'D#',
                'E': 'E',
                'F': 'F',
                'F#': 'F#',
                'G': 'G',
                'G#': 'G#',
                'A': 'A',
                'A#': 'A#',
                'B': 'B'
            },
            'german': {
                'C': 'C',
                'C#': 'Cis',
                'D': 'D',
                'D#': 'Dis',
                'E': 'E',
                'F': 'F',
                'F#': 'Fis',
                'G': 'G',
                'G#': 'Gis',
                'A': 'A',
                'A#': 'Ais',
                'B': 'H'
            }
        };

        function loadNotationPreference() {
            try {
                return localStorage.getItem(NOTATION_STORAGE_KEY) || 'english';
            } catch (e) {
                return 'english';
            }
        }

        function saveNotationPreference(notation) {
            try {
                localStorage.setItem(NOTATION_STORAGE_KEY, notation);
            } catch (e) {
                console.error('Failed to save notation preference:', e);
            }
        }

        function convertNote(note, notation) {
            return NOTATION_MAP[notation][note] || note;
        }

        // Chord definitions (root, third, fifth)
        // Using sharp notation to match pitch detector output
        const CHORDS = {
            'C': ['C', 'E', 'G'],
            'D': ['D', 'F#', 'A'],
            'E': ['E', 'G#', 'B'],
            'F': ['F', 'A', 'C'],
            'G': ['G', 'B', 'D'],
            'A': ['A', 'C#', 'E'],
            'B': ['B', 'D#', 'F#'],
            'Am': ['A', 'C', 'E'],
            'Bm': ['B', 'D', 'F#'],
            'Cm': ['C', 'D#', 'G'],
            'Dm': ['D', 'F', 'A'],
            'Em': ['E', 'G', 'B'],
            'Fm': ['F', 'G#', 'C'],
            'Gm': ['G', 'A#', 'D']
        };

        // Base class for shared pitch detection logic
        class BaseTrainer {
            constructor() {
                this.audioContext = null;
                this.analyser = null;
                this.microphone = null;
                this.mediaStream = null;
                this.isRunning = false;
                this.lastDetectedNote = null;
                this.detectionCooldown = false;
                this.lastFrequency = null;
                this.stableCount = 0;
                this.wakeLock = null;
            }

            detect() {
                if (!this.isRunning) return;

                const buffer = new Float32Array(this.analyser.fftSize);
                this.analyser.getFloatTimeDomainData(buffer);

                const result = this.detectPitch(buffer);

                if (result && result.frequency && result.confidence > 0.9) {
                    const note = this.frequencyToNote(result.frequency);
                    if (note) {
                        this.handleDetectedNote(note);
                    }
                }

                requestAnimationFrame(() => this.detect());
            }

            detectPitch(buffer) {
                const rms = PitchDetector.calculateRMS(buffer);
                if (rms < 0.01) return null;

                const autocorrelation = PitchDetector.autoCorrelate(buffer, this.audioContext.sampleRate);
                if (!autocorrelation) return null;

                let { frequency, confidence } = autocorrelation;

                if (frequency < 80 || frequency > 1200 || confidence < 0.90) return null;

                // Temporal smoothing - only accept stable frequencies
                if (this.lastFrequency) {
                    const freqDiff = Math.abs(frequency - this.lastFrequency);
                    const tolerance = this.lastFrequency * 0.02;

                    if (freqDiff < tolerance) {
                        this.stableCount++;
                        frequency = (frequency + this.lastFrequency) / 2;
                    } else {
                        this.stableCount = 0;
                    }
                }

                this.lastFrequency = frequency;

                if (this.stableCount < 2) return null;

                return { frequency, confidence };
            }

            frequencyToNote(frequency) {
                return PitchDetector.frequencyToNote(frequency);
            }

            async requestWakeLock() {
                if (!('wakeLock' in navigator)) {
                    console.warn('Screen Wake Lock API not supported');
                    return;
                }

                try {
                    this.wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock activated');

                    this.wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock released');
                    });
                } catch (err) {
                    console.error('Wake Lock request failed:', err);
                }
            }

            async releaseWakeLock() {
                if (this.wakeLock !== null) {
                    try {
                        await this.wakeLock.release();
                        this.wakeLock = null;
                        console.log('Wake Lock manually released');
                    } catch (err) {
                        console.error('Wake Lock release failed:', err);
                    }
                }
            }

            // To be implemented by child classes
            handleDetectedNote(note) {
                throw new Error('handleDetectedNote must be implemented by child class');
            }
        }

        class InversionTrainer extends BaseTrainer {
            constructor() {
                super();

                // InversionTrainer-specific properties
                this.currentChord = 'C';
                this.currentSequenceIndex = 0;
                this.currentNoteIndex = 0;
                this.sequences = [];
                this.synth = null;
                this.startTime = null;
                this.timerInterval = null;
                this.notation = loadNotationPreference();

                this.init();
            }

            init() {
                const startBtn = document.getElementById('start-training');
                const stopBtn = document.getElementById('stop-training');
                const chordSelect = document.getElementById('training-chord');
                const notationToggle = document.getElementById('notation-toggle');

                startBtn.addEventListener('click', () => this.start());
                stopBtn.addEventListener('click', () => this.stop());
                chordSelect.addEventListener('change', (e) => {
                    this.currentChord = e.target.value;
                    this.updateSequenceBoxes();
                    this.displayBestTime();
                });
                notationToggle.addEventListener('click', () => this.toggleNotation());

                // Initialize Tone.js synth for success sound
                if (typeof Tone !== 'undefined') {
                    this.synth = new Tone.PolySynth(Tone.Synth).toDestination();
                }

                // Update notation toggle display
                this.updateNotationToggle();

                // Show sequence boxes on page load
                this.updateSequenceBoxes();

                // Display best time
                this.displayBestTime();
            }

            toggleNotation() {
                this.notation = this.notation === 'english' ? 'german' : 'english';
                saveNotationPreference(this.notation);
                this.updateNotationToggle();
                // Refresh sequence boxes with new notation
                this.createSequenceBoxes();
            }

            updateNotationToggle() {
                const toggleBtn = document.getElementById('notation-toggle');
                toggleBtn.textContent = this.notation === 'english' ? 'English' : 'German';
            }

            displayBestTime() {
                const records = this.loadRecords();
                const chordRecords = records[this.currentChord];
                const displayEl = document.getElementById('best-time-display');

                if (chordRecords && chordRecords.length > 0) {
                    const best = chordRecords[0]; // Already sorted by fastest time
                    const date = new Date(best.date);
                    const dateStr = date.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });

                    const mins = Math.floor(best.time / 60);
                    const secs = best.time % 60;
                    const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;

                    document.getElementById('best-time-value').textContent = timeStr;
                    document.getElementById('best-time-date').textContent = `on ${dateStr}`;
                } else {
                    document.getElementById('best-time-value').textContent = '-';
                    document.getElementById('best-time-date').textContent = 'No records yet';
                }

                displayEl.style.display = 'block';
            }

            loadRecords() {
                try {
                    const stored = localStorage.getItem('chordz-training-records');
                    return stored ? JSON.parse(stored) : {};
                } catch (e) {
                    console.error('Failed to load records:', e);
                    return {};
                }
            }

            saveRecord(chord, time) {
                const records = this.loadRecords();
                if (!records[chord]) {
                    records[chord] = [];
                }

                records[chord].push({
                    time: time,
                    date: new Date().toISOString()
                });

                // Keep only the best 10 records per chord (sorted by fastest time)
                records[chord].sort((a, b) => a.time - b.time);
                records[chord] = records[chord].slice(0, 10);

                try {
                    localStorage.setItem('chordz-training-records', JSON.stringify(records));
                    // Update best time display
                    this.displayBestTime();
                } catch (e) {
                    console.error('Failed to save records:', e);
                }
            }

            updateSequenceBoxes() {
                this.sequences = this.generateSequences();
                this.currentSequenceIndex = 0;
                this.currentNoteIndex = 0;
                this.createSequenceBoxes();
            }

            createSequenceBoxes() {
                const container = document.getElementById('sequence-boxes');
                container.innerHTML = '';

                this.sequences.forEach((sequence, index) => {
                    const box = document.createElement('div');
                    box.id = `sequence-box-${index}`;
                    box.style.cssText = `
                        padding: 12px;
                        background: var(--surface);
                        border: 2px solid var(--surface-light);
                        border-radius: 8px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 12px;
                        position: relative;
                        min-height: 60px;
                        transition: all 0.3s ease;
                    `;

                    // Create note badges
                    sequence.forEach((note, noteIndex) => {
                        const noteBadge = document.createElement('div');
                        noteBadge.id = `note-${index}-${noteIndex}`;
                        noteBadge.textContent = convertNote(note, this.notation);
                        noteBadge.style.cssText = `
                            padding: 10px 18px;
                            background: var(--background);
                            color: var(--text-primary);
                            border-radius: 6px;
                            font-weight: bold;
                            font-size: 1.2rem;
                            font-family: 'Courier New', monospace;
                            border: 2px solid transparent;
                            transition: all 0.3s ease;
                        `;
                        box.appendChild(noteBadge);
                    });

                    container.appendChild(box);
                });
            }

            generateSequences() {
                const notes = CHORDS[this.currentChord];
                if (!notes) return [];

                const [root, third, fifth] = notes;

                // All 6 sequences: up and down for each inversion
                return [
                    [root, third, fifth],  // Root position up: CEG
                    [third, fifth, root],  // 1st inversion up: EGC
                    [fifth, root, third],  // 2nd inversion up: GCE
                    [third, root, fifth],  // Root position down: ECG
                    [root, fifth, third],  // 1st inversion down: CGE
                    [fifth, third, root]   // 2nd inversion down: GEC
                ];
            }

            async countdown() {
                const countdownContainer = document.getElementById('countdown-display');
                const countdownEl = countdownContainer.querySelector('div');
                for (let i = 3; i > 0; i--) {
                    countdownEl.textContent = i;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                countdownEl.textContent = 'GO!';
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            async start() {
                try {
                    // Reset UI from previous training
                    document.getElementById('success-message').style.display = 'none';

                    // Reset progress
                    this.currentSequenceIndex = 0;
                    this.currentNoteIndex = 0;
                    this.updateSequenceBoxes();

                    // Start Tone.js context
                    if (this.synth) {
                        await Tone.start();
                    }

                    // Request microphone access
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            autoGainControl: false,
                            noiseSuppression: false
                        }
                    });

                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 8192;
                    this.analyser.smoothingTimeConstant = 0.3;

                    this.microphone = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.microphone.connect(this.analyser);

                    // Request wake lock to keep screen awake
                    await this.requestWakeLock();

                    // Hide start button, show countdown
                    document.getElementById('start-training').style.display = 'none';
                    document.getElementById('countdown-display').style.display = 'block';

                    // Countdown
                    await this.countdown();

                    // Reset performance tracking (start timer after countdown)
                    this.startTime = Date.now();
                    this.updateStatsDisplay();

                    // Start timer
                    this.timerInterval = setInterval(() => this.updateStatsDisplay(), 100);

                    this.isRunning = true;
                    this.updateUI();
                    this.detect();

                    // Update UI
                    document.getElementById('countdown-display').style.display = 'none';
                    document.getElementById('stop-training').style.display = 'block';
                    document.getElementById('current-stats').style.display = 'block';
                } catch (error) {
                    alert('Error accessing microphone: ' + error.message);
                }
            }

            updateStatsDisplay() {
                if (!this.startTime) return;

                const elapsedSeconds = Math.floor((Date.now() - this.startTime) / 1000);
                const mins = Math.floor(elapsedSeconds / 60);
                const secs = elapsedSeconds % 60;

                document.getElementById('timer-display').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            stop() {
                this.isRunning = false;

                // Stop timer
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }

                // Release wake lock to allow screen to sleep
                this.releaseWakeLock();

                if (this.microphone) {
                    this.microphone.disconnect();
                    this.microphone = null;
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }

                // Update UI but keep results visible
                document.getElementById('start-training').style.display = 'block';
                document.getElementById('stop-training').style.display = 'none';
                document.getElementById('countdown-display').style.display = 'none';
                document.getElementById('current-stats').style.display = 'none';
                // Don't hide success message - keep it visible
            }

            handleDetectedNote(note) {
                // Ignore all notes during cooldown period or if it's the same note we just detected
                if (this.detectionCooldown || note === this.lastDetectedNote) {
                    return;
                }

                const currentSequence = this.sequences[this.currentSequenceIndex];
                const expectedNote = currentSequence[this.currentNoteIndex];

                // Check if it's the correct note
                if (note === expectedNote) {
                    this.lastDetectedNote = note;
                    this.detectionCooldown = true;

                    // Turn note green and remove red border if any
                    const noteBadge = document.getElementById(`note-${this.currentSequenceIndex}-${this.currentNoteIndex}`);
                    if (noteBadge) {
                        noteBadge.style.background = 'var(--accent-happy)';
                        noteBadge.style.color = 'white';
                        noteBadge.style.border = '2px solid transparent';
                    }

                    // Move to next note
                    this.currentNoteIndex++;

                    // Check if sequence is complete
                    if (this.currentNoteIndex >= currentSequence.length) {
                        this.currentSequenceIndex++;
                        this.currentNoteIndex = 0;

                        // Check if all sequences are complete
                        if (this.currentSequenceIndex >= this.sequences.length) {
                            this.showSuccess();
                        } else {
                            this.updateUI();
                        }
                    } else {
                        this.updateUI();
                    }

                    // Reset cooldown after delay
                    setTimeout(() => {
                        this.detectionCooldown = false;
                        this.lastDetectedNote = null;
                    }, 500);
                } else {
                    // Wrong note - show red flash
                    this.showWrongNote(note);
                }
            }

            showWrongNote(note) {
                // Briefly flash expected note with red border
                const expectedNoteBadge = document.getElementById(`note-${this.currentSequenceIndex}-${this.currentNoteIndex}`);
                if (expectedNoteBadge) {
                    // Show red border
                    expectedNoteBadge.style.border = '2px solid #ef4444';

                    // Fade out after brief delay
                    setTimeout(() => {
                        expectedNoteBadge.style.border = '2px solid transparent';
                    }, 300);
                }
            }

            updateUI() {
                // Highlight current sequence box
                this.sequences.forEach((_, index) => {
                    const box = document.getElementById(`sequence-box-${index}`);
                    if (box) {
                        if (index === this.currentSequenceIndex) {
                            box.style.borderColor = 'var(--primary-color)';
                            box.style.background = 'rgba(99, 102, 241, 0.1)';
                        } else if (index < this.currentSequenceIndex) {
                            box.style.borderColor = 'var(--accent-happy)';
                            box.style.background = 'rgba(16, 185, 129, 0.1)';
                        } else {
                            box.style.borderColor = 'var(--surface-light)';
                            box.style.background = 'var(--surface)';
                        }
                    }
                });
            }

            async showSuccess() {
                this.isRunning = false;

                // Stop timer
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }

                // Calculate final time
                const finalTime = Math.floor((Date.now() - this.startTime) / 1000);
                const mins = Math.floor(finalTime / 60);
                const secs = finalTime % 60;

                // Save record
                this.saveRecord(this.currentChord, finalTime);

                // Update success message
                const successMsg = document.getElementById('success-message');
                successMsg.innerHTML = `
                    <div style="font-size: 4rem; margin-bottom: 15px;">🎉</div>
                    <h2 style="color: var(--accent-happy); margin: 0 0 10px 0;">Perfect!</h2>
                    <p style="font-size: 1.2rem; color: var(--text-primary); margin: 0 0 20px 0;">You've mastered all inversions!</p>
                    <div style="display: flex; justify-content: center; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                        <div>
                            <div style="font-size: 0.9rem; color: var(--text-secondary);">Time</div>
                            <div style="font-size: 1.8rem; font-weight: bold; font-family: 'Courier New', monospace;">${mins}:${secs.toString().padStart(2, '0')}</div>
                        </div>
                    </div>
                `;
                successMsg.style.display = 'block';

                // Play success chord
                if (this.synth) {
                    const notes = CHORDS[this.currentChord];
                    await this.synth.triggerAttackRelease(notes.map(n => n + '4'), '1.5');

                    // Play ascending arpeggio
                    setTimeout(() => this.synth.triggerAttackRelease(notes[0] + '4', '0.2'), 100);
                    setTimeout(() => this.synth.triggerAttackRelease(notes[1] + '4', '0.2'), 300);
                    setTimeout(() => this.synth.triggerAttackRelease(notes[2] + '4', '0.2'), 500);
                    setTimeout(() => this.synth.triggerAttackRelease(notes.map(n => n + '5'), '1'), 700);
                }

                // Disconnect audio resources and stop detection
                this.stop();
            }
        }

        // Initialize trainer
        const trainer = new InversionTrainer();
    </script>
</body>
