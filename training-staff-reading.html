                <div style="font-size: 2rem; margin-bottom: 5px;">🎼</div>

            <!-- Best Score Display -->
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(99, 102, 241, 0.1); border-left: 4px solid var(--primary-color); border-radius: 6px; margin-bottom: 12px; font-size: 0.85rem; gap: 15px;">

                    <option value="easy">🟢 Easy (E4-F5, staff only)</option>

            <button id="start-btn" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 600; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 15px;">

            <div id="success-message" style="display: none; text-align: center; padding: 30px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2)); border-radius: 15px; border: 3px solid var(--accent-happy); margin-top: 30px;">

    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
    <script src="pitch-detector.js"></script>
    <script>
        // Musical staff note positions (C4 to C6 range)
        const STAFF_NOTES = {
            'C4': { line: 10, ledger: true, accidental: null },
            'C#4': { line: 10, ledger: true, accidental: 'sharp' },
            'Db4': { line: 9, ledger: false, accidental: 'flat' },
            'D4': { line: 9, ledger: false, accidental: null },
            'D#4': { line: 9, ledger: false, accidental: 'sharp' },
            'Eb4': { line: 8, ledger: false, accidental: 'flat' },
            'E4': { line: 8, ledger: false, accidental: null },
            'F4': { line: 7, ledger: false, accidental: null },
            'F#4': { line: 7, ledger: false, accidental: 'sharp' },
            'Gb4': { line: 6, ledger: false, accidental: 'flat' },
            'G4': { line: 6, ledger: false, accidental: null },
            'G#4': { line: 6, ledger: false, accidental: 'sharp' },
            'Ab4': { line: 5, ledger: false, accidental: 'flat' },
            'A4': { line: 5, ledger: false, accidental: null },
            'A#4': { line: 5, ledger: false, accidental: 'sharp' },
            'Bb4': { line: 4, ledger: false, accidental: 'flat' },
            'B4': { line: 4, ledger: false, accidental: null },
            'C5': { line: 3, ledger: false, accidental: null },
            'C#5': { line: 3, ledger: false, accidental: 'sharp' },
            'Db5': { line: 2, ledger: false, accidental: 'flat' },
            'D5': { line: 2, ledger: false, accidental: null },
            'D#5': { line: 2, ledger: false, accidental: 'sharp' },
            'Eb5': { line: 1, ledger: false, accidental: 'flat' },
            'E5': { line: 1, ledger: false, accidental: null },
            'F5': { line: 0, ledger: false, accidental: null },
            'F#5': { line: 0, ledger: false, accidental: 'sharp' },
            'Gb5': { line: -1, ledger: false, accidental: 'flat' },
            'G5': { line: -1, ledger: false, accidental: null },
            'G#5': { line: -1, ledger: false, accidental: 'sharp' },
            'Ab5': { line: -2, ledger: true, accidental: 'flat' },
            'A5': { line: -2, ledger: true, accidental: null },
            'A#5': { line: -2, ledger: true, accidental: 'sharp' },
            'Bb5': { line: -3, ledger: true, accidental: 'flat' },
            'B5': { line: -3, ledger: true, accidental: null },
            'C6': { line: -4, ledger: true, accidental: null }
        };

        // Enharmonic equivalents for matching
        const ENHARMONIC_MAP = {
            'C#': 'Db', 'Db': 'C#',
            'D#': 'Eb', 'Eb': 'D#',
            'F#': 'Gb', 'Gb': 'F#',
            'G#': 'Ab', 'Ab': 'G#',
            'A#': 'Bb', 'Bb': 'A#'
        };

        function areEnharmonic(note1, note2) {
            const name1 = note1.replace(/[0-9]/g, '');
            const name2 = note2.replace(/[0-9]/g, '');
            return name1 === name2 || ENHARMONIC_MAP[name1] === name2;
        }

        // Difficulty ranges
        const DIFFICULTY_RANGES = {
            'easy': ['E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5', 'F5'], // Staff only, no ledger lines
            'medium': ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5', 'F5', 'G5'], // 1 ledger below, 1 space above
            'hard': Object.keys(STAFF_NOTES) // All notes C4-C6
        };

        const TRAINING_DURATION = 60; // seconds
        const DIFFICULTY_STORAGE_KEY = 'chordz-staff-reading-difficulty';

        function getDifficultyNotes(difficulty) {
            const range = DIFFICULTY_RANGES[difficulty] || DIFFICULTY_RANGES['medium'];
            // Include all accidentals for notes in the range
            return Object.keys(STAFF_NOTES).filter(note => {
                const noteName = note.replace(/[#b]/g, ''); // Remove accidentals
                return range.includes(noteName);
            });
        }

        // Base class for shared pitch detection logic
        class BaseTrainer {
            constructor() {
                this.audioContext = null;
                this.analyser = null;
                this.microphone = null;
                this.mediaStream = null;
                this.isRunning = false;
                this.lastDetectedNote = null;
                this.detectionCooldown = false;
                this.lastFrequency = null;
                this.stableCount = 0;
                this.wakeLock = null;
            }

            detect() {
                if (!this.isRunning) return;

                const buffer = new Float32Array(this.analyser.fftSize);
                this.analyser.getFloatTimeDomainData(buffer);

                const result = this.detectPitch(buffer);

                if (result && result.frequency && result.confidence > 0.9) {
                    const note = this.frequencyToNote(result.frequency);
                    if (note) {
                        this.handleDetectedNote(note);
                    }
                }

                requestAnimationFrame(() => this.detect());
            }

            detectPitch(buffer) {
                const rms = PitchDetector.calculateRMS(buffer);
                if (rms < 0.01) return null;

                const autocorrelation = PitchDetector.autoCorrelate(buffer, this.audioContext.sampleRate);
                if (!autocorrelation) return null;

                let { frequency, confidence } = autocorrelation;

                if (frequency < 80 || frequency > 1200 || confidence < 0.90) return null;

                // Temporal smoothing
                if (this.lastFrequency) {
                    const freqDiff = Math.abs(frequency - this.lastFrequency);
                    const tolerance = this.lastFrequency * 0.02;

                    if (freqDiff < tolerance) {
                        this.stableCount++;
                        frequency = (frequency + this.lastFrequency) / 2;
                    } else {
                        this.stableCount = 0;
                    }
                }

                this.lastFrequency = frequency;

                if (this.stableCount < 2) return null;

                return { frequency, confidence };
            }

            frequencyToNote(frequency) {
                return PitchDetector.frequencyToNote(frequency);
            }

            async requestWakeLock() {
                if (!('wakeLock' in navigator)) {
                    console.warn('Screen Wake Lock API not supported');
                    return;
                }

                try {
                    this.wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.error('Wake Lock request failed:', err);
                }
            }

            async releaseWakeLock() {
                if (this.wakeLock !== null) {
                    try {
                        await this.wakeLock.release();
                        this.wakeLock = null;
                    } catch (err) {
                        console.error('Wake Lock release failed:', err);
                    }
                }
            }

            handleDetectedNote(note) {
                throw new Error('handleDetectedNote must be implemented by child class');
            }
        }

        class StaffReadingTrainer extends BaseTrainer {
            constructor() {
                super();
                this.score = 0;
                this.timeLeft = TRAINING_DURATION;
                this.timerInterval = null;
                this.targetNote = null;
                this.svg = null;
                this.difficulty = 'medium';
                this.availableNotes = [];

                this.init();
            }

            init() {
                const startBtn = document.getElementById('start-btn');
                const stopBtn = document.getElementById('stop-btn');
                const difficultySelector = document.getElementById('difficulty-selector');

                startBtn.addEventListener('click', () => this.start());
                stopBtn.addEventListener('click', () => this.stop());

                // Load difficulty preference
                try {
                    const savedDifficulty = localStorage.getItem(DIFFICULTY_STORAGE_KEY);
                    if (savedDifficulty && DIFFICULTY_RANGES[savedDifficulty]) {
                        this.difficulty = savedDifficulty;
                        difficultySelector.value = savedDifficulty;
                    }
                } catch (e) {
                    console.error('Failed to load difficulty preference:', e);
                }

                // Difficulty change handler
                difficultySelector.addEventListener('change', (e) => {
                    this.difficulty = e.target.value;
                    this.updateAvailableNotes();
                    try {
                        localStorage.setItem(DIFFICULTY_STORAGE_KEY, this.difficulty);
                    } catch (e) {
                        console.error('Failed to save difficulty preference:', e);
                    }
                });

                this.svg = document.getElementById('staff-svg');
                this.updateAvailableNotes();
                this.displayBestScore();
            }

            updateAvailableNotes() {
                this.availableNotes = getDifficultyNotes(this.difficulty);
            }

            displayBestScore() {
                const records = this.loadRecords();
                if (records && records.length > 0) {
                    const best = records[0];
                    const date = new Date(best.date);
                    const dateStr = date.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });

                    document.getElementById('best-score-value').textContent = best.score;
                    document.getElementById('best-score-date').textContent = `on ${dateStr}`;
                } else {
                    document.getElementById('best-score-value').textContent = '-';
                    document.getElementById('best-score-date').textContent = 'No records yet';
                }
            }

            loadRecords() {
                try {
                    const stored = localStorage.getItem('chordz-staff-reading-records');
                    return stored ? JSON.parse(stored) : [];
                } catch (e) {
                    console.error('Failed to load records:', e);
                    return [];
                }
            }

            saveRecord(score) {
                const records = this.loadRecords();
                records.push({
                    score: score,
                    date: new Date().toISOString()
                });

                // Keep only best 10 records (sorted by highest score)
                records.sort((a, b) => b.score - a.score);
                const topRecords = records.slice(0, 10);

                try {
                    localStorage.setItem('chordz-staff-reading-records', JSON.stringify(topRecords));
                    this.displayBestScore();

                    // Check if new record
                    return topRecords[0].score === score;
                } catch (e) {
                    console.error('Failed to save records:', e);
                    return false;
                }
            }

            drawStaff() {
                // Clear SVG
                this.svg.innerHTML = '';

                const width = 400;
                const height = 250;
                const staffY = 80; // Start position of staff
                const lineSpacing = 15;

                // Draw treble clef (simplified)
                const clef = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                clef.setAttribute('x', '20');
                clef.setAttribute('y', staffY + lineSpacing * 3);
                clef.setAttribute('font-size', '60');
                clef.setAttribute('font-family', 'serif');
                clef.setAttribute('fill', '#000');
                clef.textContent = '𝄞';
                this.svg.appendChild(clef);

                // Draw staff lines
                for (let i = 0; i < 5; i++) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    const y = staffY + i * lineSpacing;
                    line.setAttribute('x1', '10');
                    line.setAttribute('y1', y);
                    line.setAttribute('x2', width - 10);
                    line.setAttribute('y2', y);
                    line.setAttribute('stroke', '#000');
                    line.setAttribute('stroke-width', '1.5');
                    this.svg.appendChild(line);
                }

                // Draw note if we have one
                if (this.targetNote) {
                    this.drawNote(this.targetNote);
                }
            }

            drawNote(noteWithOctave) {
                const noteData = STAFF_NOTES[noteWithOctave];
                if (!noteData) return;

                const staffY = 80;
                const lineSpacing = 15;
                const noteX = 250;
                const noteY = staffY + (4 - noteData.line) * (lineSpacing / 2);

                // Draw ledger lines if needed
                // Staff goes from line 0 (F5, top) to line 8 (E4, bottom)
                // Ledger lines are at even positions: -2, -4 above; 10, 12 below
                if (noteData.line < 0) {
                    // Note above staff - draw ledger lines at -2, -4, etc.
                    for (let ledgerLine = -2; ledgerLine >= noteData.line; ledgerLine -= 2) {
                        const ledgerY = staffY + (4 - ledgerLine) * (lineSpacing / 2);
                        const ledger = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        ledger.setAttribute('x1', noteX - 15);
                        ledger.setAttribute('y1', ledgerY);
                        ledger.setAttribute('x2', noteX + 15);
                        ledger.setAttribute('y2', ledgerY);
                        ledger.setAttribute('stroke', '#000');
                        ledger.setAttribute('stroke-width', '1.5');
                        this.svg.appendChild(ledger);
                    }
                } else if (noteData.line > 8) {
                    // Note below staff - draw ledger lines at 10, 12, etc.
                    for (let ledgerLine = 10; ledgerLine <= noteData.line; ledgerLine += 2) {
                        const ledgerY = staffY + (4 - ledgerLine) * (lineSpacing / 2);
                        const ledger = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        ledger.setAttribute('x1', noteX - 15);
                        ledger.setAttribute('y1', ledgerY);
                        ledger.setAttribute('x2', noteX + 15);
                        ledger.setAttribute('y2', ledgerY);
                        ledger.setAttribute('stroke', '#000');
                        ledger.setAttribute('stroke-width', '1.5');
                        this.svg.appendChild(ledger);
                    }
                }

                // Draw accidental (sharp or flat) if needed
                if (noteData.accidental) {
                    const accidental = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    accidental.setAttribute('x', noteX - 25);
                    accidental.setAttribute('y', noteY + 5);
                    accidental.setAttribute('font-size', '30');
                    accidental.setAttribute('font-family', 'serif');
                    accidental.setAttribute('fill', '#000');
                    accidental.textContent = noteData.accidental === 'sharp' ? '♯' : '♭';
                    this.svg.appendChild(accidental);
                }

                // Draw note head (filled circle)
                const noteHead = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                noteHead.setAttribute('cx', noteX);
                noteHead.setAttribute('cy', noteY);
                noteHead.setAttribute('rx', '7');
                noteHead.setAttribute('ry', '5.5');
                noteHead.setAttribute('fill', '#000');
                noteHead.setAttribute('transform', `rotate(-20 ${noteX} ${noteY})`);
                this.svg.appendChild(noteHead);

                // Draw stem
                const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                if (noteData.line <= 4) {
                    // Stem up
                    stem.setAttribute('x1', noteX + 6.5);
                    stem.setAttribute('y1', noteY);
                    stem.setAttribute('x2', noteX + 6.5);
                    stem.setAttribute('y2', noteY - 35);
                } else {
                    // Stem down
                    stem.setAttribute('x1', noteX - 6.5);
                    stem.setAttribute('y1', noteY);
                    stem.setAttribute('x2', noteX - 6.5);
                    stem.setAttribute('y2', noteY + 35);
                }
                stem.setAttribute('stroke', '#000');
                stem.setAttribute('stroke-width', '1.5');
                this.svg.appendChild(stem);
            }

            pickRandomNote() {
                this.targetNote = this.availableNotes[Math.floor(Math.random() * this.availableNotes.length)];
                this.drawStaff();
            }

            async start() {
                try {
                    // Request microphone access
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 2048;
                    this.microphone = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.microphone.connect(this.analyser);

                    // Start Tone.js
                    if (typeof Tone !== 'undefined') {
                        await Tone.start();
                    }

                    // Request wake lock
                    await this.requestWakeLock();

                    // Initialize training state
                    this.score = 0;
                    this.timeLeft = TRAINING_DURATION;
                    this.isRunning = true;
                    this.updateAvailableNotes(); // Update notes based on current difficulty

                    // Update UI
                    document.getElementById('start-btn').style.display = 'none';
                    document.getElementById('stop-btn').style.display = 'block';
                    document.getElementById('stats-display').style.display = 'block';
                    document.getElementById('staff-container').style.display = 'block';
                    document.getElementById('success-message').style.display = 'none';

                    this.updateDisplay();
                    this.pickRandomNote();

                    // Start timer
                    this.timerInterval = setInterval(() => {
                        this.timeLeft--;
                        this.updateDisplay();

                        if (this.timeLeft <= 0) {
                            this.finish();
                        }
                    }, 1000);

                    // Start pitch detection
                    this.detect();

                } catch (error) {
                    alert('Error accessing microphone: ' + error.message);
                }
            }

            async stop() {
                this.isRunning = false;

                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                }

                if (this.audioContext) {
                    await this.audioContext.close();
                }

                await this.releaseWakeLock();

                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('stop-btn').style.display = 'none';
                document.getElementById('stats-display').style.display = 'none';
                document.getElementById('staff-container').style.display = 'none';
                document.getElementById('success-message').style.display = 'none';
            }

            async finish() {
                this.isRunning = false;

                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                }

                if (this.audioContext) {
                    await this.audioContext.close();
                }

                await this.releaseWakeLock();

                // Save record and check if it's a new best
                const isNewRecord = this.saveRecord(this.score);

                // Show results
                document.getElementById('stop-btn').style.display = 'none';
                document.getElementById('stats-display').style.display = 'none';
                document.getElementById('staff-container').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
                document.getElementById('final-score').textContent = `Final Score: ${this.score}`;

                if (isNewRecord) {
                    document.getElementById('new-record').style.display = 'block';
                }

                setTimeout(() => {
                    document.getElementById('start-btn').style.display = 'block';
                    document.getElementById('success-message').style.display = 'none';
                    document.getElementById('new-record').style.display = 'none';
                }, 5000);
            }

            updateDisplay() {
                document.getElementById('time-left').textContent = this.timeLeft;
                document.getElementById('score').textContent = this.score;
            }

            handleDetectedNote(detectedNote) {
                if (this.detectionCooldown) {
                    return;
                }

                // Check if detected note matches target (including enharmonic equivalents)
                if (areEnharmonic(detectedNote, this.targetNote)) {
                    // Correct note!
                    this.score++;
                    this.updateDisplay();

                    // Flash effect
                    this.svg.style.backgroundColor = '#10b981';
                    setTimeout(() => {
                        this.svg.style.backgroundColor = 'white';
                    }, 100);

                    // Cooldown and pick new note
                    this.detectionCooldown = true;
                    setTimeout(() => {
                        this.detectionCooldown = false;
                    }, 500);

                    this.pickRandomNote();
                } else {
                    // Wrong note - flash red
                    this.svg.style.backgroundColor = '#ef4444';
                    setTimeout(() => {
                        this.svg.style.backgroundColor = 'white';
                    }, 150);
                }
            }
        }

        // Initialize trainer
        const trainer = new StaffReadingTrainer();

        // Cleanup Tone.js when leaving the page
        window.addEventListener('beforeunload', () => {
            if (trainer.synth) {
                trainer.synth.dispose();
            }
        });
    </script>
