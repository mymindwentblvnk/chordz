<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chordz">
    <title>Speed Training - Chordz</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="guide-styles.css">
</head>
<body>
    <nav class="main-nav">
        <a href="training.html" class="nav-link active">🎮 Training</a>
        <a href="chord-progressions.html" class="nav-link">🎵 Chord Progressions</a>
        <a href="index.html" class="nav-link">🎤 Find Note</a>
        <a href="wiki.html" class="nav-link">📚 Wiki</a>
    </nav>

    <div class="guide-container">
        <div class="back-nav">
            <a href="training.html" class="back-link">← Back to Training</a>
        </div>

        <div class="guide-section" style="max-width: 600px; margin: 0 auto; padding: 10px 20px 20px 20px;">
            <header style="text-align: center; margin-bottom: 15px;">
                <div style="font-size: 2rem; margin-bottom: 5px;">⚡</div>
                <h1 style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0 0 5px 0; font-size: 1.5rem;">Speed Training</h1>
                <p class="subtitle" style="font-size: 0.85rem; margin: 0;">Find and play keys as fast as possible in 60 seconds</p>
            </header>

            <!-- Best Score Display & Notation Toggle -->
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(99, 102, 241, 0.1); border-left: 4px solid var(--primary-color); border-radius: 6px; margin-bottom: 12px; font-size: 0.85rem; gap: 15px;">
                <div>
                    <span style="color: var(--text-secondary);">🏆 Best:</span>
                    <strong id="best-score-value" style="color: var(--primary-color); margin-left: 8px;">-</strong>
                    <span style="color: var(--text-secondary); margin-left: 8px; font-size: 0.8rem;" id="best-score-date">No records yet</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; white-space: nowrap;">
                    <span style="color: var(--text-secondary);">Notation:</span>
                    <button id="notation-toggle" style="padding: 5px 10px; font-size: 0.8rem; font-weight: 600; background: var(--primary-color); color: white; border: none; border-radius: 5px; cursor: pointer; min-width: 70px;">
                        English
                    </button>
                </div>
            </div>

            <button id="speed-start-btn" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 600; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 15px;">
                🎤 Start Speed Training
            </button>

            <button id="speed-stop-btn" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 600; background: #ef4444; color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 15px; display: none;">
                ⏹ Stop Training
            </button>

            <!-- Countdown Display -->
            <div id="countdown-display" style="display: none; margin-bottom: 10px; padding: 12px; background: var(--surface); border-radius: 8px; text-align: center;">
                <div style="font-size: 1.4rem; font-weight: bold; color: var(--primary-color); font-family: 'Courier New', monospace;">3</div>
            </div>

            <!-- Speed Training Stats -->
            <div id="speed-stats" style="display: none; margin-bottom: 10px; padding: 12px; background: var(--surface); border-radius: 8px; text-align: center;">
                <div style="display: flex; justify-content: space-around; gap: 20px;">
                    <div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">Time Left</div>
                        <div id="speed-timer" style="font-size: 1.4rem; font-weight: bold; color: var(--primary-color); font-family: 'Courier New', monospace;">60</div>
                    </div>
                    <div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">Score</div>
                        <div id="speed-score" style="font-size: 1.4rem; font-weight: bold; color: var(--accent-happy); font-family: 'Courier New', monospace;">0</div>
                    </div>
                </div>
            </div>

            <!-- Target Note Display -->
            <div id="target-note-display" style="display: none; text-align: center; margin: 10px 0;">
                <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px;">Play this note:</div>
                <div id="target-note" style="font-size: 5rem; font-weight: bold; color: var(--primary-color); padding: 30px; background: var(--surface); border-radius: 15px; border: 3px solid var(--primary-color); font-family: 'Courier New', monospace;">
                    C
                </div>
            </div>

            <!-- Speed Success Message -->
            <div id="speed-success" style="display: none; text-align: center; padding: 30px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2)); border-radius: 15px; border: 3px solid var(--accent-happy); margin-top: 30px;">
                <div style="font-size: 4rem; margin-bottom: 15px;">⚡</div>
                <h2 style="color: var(--accent-happy); margin: 0 0 10px 0;">Time's Up!</h2>
                <div id="speed-final-stats"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
    <script src="pitch-detector.js"></script>
    <script>
        // Notation conversion
        const NOTATION_STORAGE_KEY = 'chordz-notation-preference';

        const NOTATION_MAP = {
            'english': {
                'C': 'C',
                'C#': 'C#',
                'Db': 'Db',
                'D': 'D',
                'D#': 'D#',
                'Eb': 'Eb',
                'E': 'E',
                'F': 'F',
                'F#': 'F#',
                'Gb': 'Gb',
                'G': 'G',
                'G#': 'G#',
                'Ab': 'Ab',
                'A': 'A',
                'A#': 'A#',
                'Bb': 'Bb',
                'B': 'B'
            },
            'german': {
                'C': 'C',
                'C#': 'C#',
                'Db': 'Db',
                'D': 'D',
                'D#': 'D#',
                'Eb': 'Eb',
                'E': 'E',
                'F': 'F',
                'F#': 'F#',
                'Gb': 'Gb',
                'G': 'G',
                'G#': 'G#',
                'Ab': 'Ab',
                'A': 'A',
                'A#': 'A#',
                'Bb': 'B',      // German B = English Bb
                'B': 'H'        // German H = English B
            }
        };

        // Enharmonic equivalence map (notes that sound the same)
        const ENHARMONIC_MAP = {
            'C#': 'Db',
            'Db': 'C#',
            'D#': 'Eb',
            'Eb': 'D#',
            'F#': 'Gb',
            'Gb': 'F#',
            'G#': 'Ab',
            'Ab': 'G#',
            'A#': 'Bb',
            'Bb': 'A#'
        };

        function areEnharmonic(note1, note2) {
            return note1 === note2 || ENHARMONIC_MAP[note1] === note2;
        }

        function loadNotationPreference() {
            try {
                return localStorage.getItem(NOTATION_STORAGE_KEY) || 'english';
            } catch (e) {
                return 'english';
            }
        }

        function saveNotationPreference(notation) {
            try {
                localStorage.setItem(NOTATION_STORAGE_KEY, notation);
            } catch (e) {
                console.error('Failed to save notation preference:', e);
            }
        }

        function convertNote(note, notation) {
            return NOTATION_MAP[notation][note] || note;
        }

        // Base class for shared pitch detection logic
        class BaseTrainer {
            constructor() {
                this.audioContext = null;
                this.analyser = null;
                this.microphone = null;
                this.mediaStream = null;
                this.isRunning = false;
                this.lastDetectedNote = null;
                this.detectionCooldown = false;
                this.lastFrequency = null;
                this.stableCount = 0;
                this.wakeLock = null;
            }

            detect() {
                if (!this.isRunning) return;

                const buffer = new Float32Array(this.analyser.fftSize);
                this.analyser.getFloatTimeDomainData(buffer);

                const result = this.detectPitch(buffer);

                if (result && result.frequency && result.confidence > 0.9) {
                    const note = this.frequencyToNote(result.frequency);
                    if (note) {
                        this.handleDetectedNote(note);
                    }
                }

                requestAnimationFrame(() => this.detect());
            }

            detectPitch(buffer) {
                const rms = PitchDetector.calculateRMS(buffer);
                if (rms < 0.01) return null;

                const autocorrelation = PitchDetector.autoCorrelate(buffer, this.audioContext.sampleRate);
                if (!autocorrelation) return null;

                let { frequency, confidence } = autocorrelation;

                if (frequency < 80 || frequency > 1200 || confidence < 0.90) return null;

                // Temporal smoothing - only accept stable frequencies
                if (this.lastFrequency) {
                    const freqDiff = Math.abs(frequency - this.lastFrequency);
                    const tolerance = this.lastFrequency * 0.02;

                    if (freqDiff < tolerance) {
                        this.stableCount++;
                        frequency = (frequency + this.lastFrequency) / 2;
                    } else {
                        this.stableCount = 0;
                    }
                }

                this.lastFrequency = frequency;

                if (this.stableCount < 2) return null;

                return { frequency, confidence };
            }

            frequencyToNote(frequency) {
                return PitchDetector.frequencyToNote(frequency);
            }

            async requestWakeLock() {
                if (!('wakeLock' in navigator)) {
                    console.warn('Screen Wake Lock API not supported');
                    return;
                }

                try {
                    this.wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock activated');

                    this.wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock released');
                    });
                } catch (err) {
                    console.error('Wake Lock request failed:', err);
                }
            }

            async releaseWakeLock() {
                if (this.wakeLock !== null) {
                    try {
                        await this.wakeLock.release();
                        this.wakeLock = null;
                        console.log('Wake Lock manually released');
                    } catch (err) {
                        console.error('Wake Lock release failed:', err);
                    }
                }
            }

            // To be implemented by child classes
            handleDetectedNote(note) {
                throw new Error('handleDetectedNote must be implemented by child class');
            }
        }

        // Speed Training Class
        class SpeedTrainer extends BaseTrainer {
            constructor() {
                super();

                // SpeedTrainer-specific properties
                this.synth = null;
                this.targetNote = null;
                this.score = 0;
                this.timeLeft = 60;
                this.timerInterval = null;
                // All 12 chromatic notes using sharp notation (matches pitch detector output)
                this.allNotes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                this.notation = loadNotationPreference();

                this.init();
            }

            init() {
                const startBtn = document.getElementById('speed-start-btn');
                const stopBtn = document.getElementById('speed-stop-btn');
                const notationToggle = document.getElementById('notation-toggle');

                startBtn.addEventListener('click', () => this.start());
                stopBtn.addEventListener('click', () => this.stop());
                notationToggle.addEventListener('click', () => this.toggleNotation());

                // Initialize Tone.js synth
                if (typeof Tone !== 'undefined') {
                    this.synth = new Tone.Synth().toDestination();
                }

                // Display best score and notation
                this.updateNotationToggle();
                this.displayBestScore();
            }

            toggleNotation() {
                this.notation = this.notation === 'english' ? 'german' : 'english';
                saveNotationPreference(this.notation);
                this.updateNotationToggle();
                // Update displayed note if training is active
                if (this.targetNote) {
                    this.updateTargetNoteDisplay();
                }
            }

            updateNotationToggle() {
                const toggleBtn = document.getElementById('notation-toggle');
                toggleBtn.textContent = this.notation === 'english' ? 'English' : 'German';
            }

            updateTargetNoteDisplay() {
                const displayNote = convertNote(this.targetNote, this.notation);
                document.getElementById('target-note').textContent = displayNote;
            }

            displayBestScore() {
                const records = this.loadRecords();
                const displayEl = document.getElementById('best-score-display');

                if (records.length > 0) {
                    const best = records[0]; // Already sorted by highest score
                    const date = new Date(best.date);
                    const dateStr = date.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });

                    document.getElementById('best-score-value').textContent = best.score;
                    document.getElementById('best-score-date').textContent = `on ${dateStr}`;
                } else {
                    document.getElementById('best-score-value').textContent = '-';
                    document.getElementById('best-score-date').textContent = 'No records yet';
                }

                displayEl.style.display = 'block';
            }

            loadRecords() {
                try {
                    const stored = localStorage.getItem('chordz-speed-records');
                    return stored ? JSON.parse(stored) : [];
                } catch (e) {
                    console.error('Failed to load speed records:', e);
                    return [];
                }
            }

            saveRecord(score) {
                const records = this.loadRecords();
                records.push({
                    score: score,
                    date: new Date().toISOString()
                });

                // Sort by highest score first
                records.sort((a, b) => b.score - a.score);

                // Keep only top 10
                const topRecords = records.slice(0, 10);

                try {
                    localStorage.setItem('chordz-speed-records', JSON.stringify(topRecords));
                    // Update best score display
                    this.displayBestScore();
                } catch (e) {
                    console.error('Failed to save speed records:', e);
                }
            }

            async start() {
                try {
                    // Reset UI from previous training
                    document.getElementById('speed-success').style.display = 'none';

                    // Start Tone.js context
                    if (this.synth) {
                        await Tone.start();
                    }

                    // Request microphone access
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            autoGainControl: false,
                            noiseSuppression: false
                        }
                    });

                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 8192;
                    this.analyser.smoothingTimeConstant = 0.3;

                    this.microphone = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.microphone.connect(this.analyser);

                    // Request wake lock
                    await this.requestWakeLock();

                    // Hide start button, show countdown
                    document.getElementById('speed-start-btn').style.display = 'none';
                    document.getElementById('countdown-display').style.display = 'block';

                    // Countdown
                    await this.countdown();

                    // Start training
                    this.isRunning = true;
                    this.score = 0;
                    this.timeLeft = 60;

                    document.getElementById('countdown-display').style.display = 'none';
                    document.getElementById('speed-stop-btn').style.display = 'block';
                    document.getElementById('speed-stats').style.display = 'block';
                    document.getElementById('target-note-display').style.display = 'block';

                    this.nextNote();
                    this.startTimer();
                    this.detect();

                    // Scroll to target note so it's always visible
                    setTimeout(() => {
                        document.getElementById('target-note-display').scrollIntoView({
                            behavior: 'smooth',
                            block: 'center'
                        });
                    }, 100);

                } catch (error) {
                    alert('Error accessing microphone: ' + error.message);
                    this.cleanup();
                }
            }

            async countdown() {
                const countdownContainer = document.getElementById('countdown-display');
                const countdownEl = countdownContainer.querySelector('div');
                for (let i = 3; i > 0; i--) {
                    countdownEl.textContent = i;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                countdownEl.textContent = 'GO!';
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            nextNote() {
                const randomIndex = Math.floor(Math.random() * this.allNotes.length);
                let selectedNote = this.allNotes[randomIndex];

                // For black keys, randomly choose between sharp or flat notation
                // This forces the user to learn enharmonic equivalents
                if (ENHARMONIC_MAP[selectedNote] && Math.random() < 0.5) {
                    selectedNote = ENHARMONIC_MAP[selectedNote];
                }

                this.targetNote = selectedNote;
                this.updateTargetNoteDisplay();
            }

            startTimer() {
                this.updateStats();
                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    this.updateStats();

                    if (this.timeLeft <= 0) {
                        this.endTraining();
                    }
                }, 1000);
            }

            updateStats() {
                document.getElementById('speed-timer').textContent = this.timeLeft;
                document.getElementById('speed-score').textContent = this.score;
            }

            handleDetectedNote(note) {
                const isMatch = areEnharmonic(note, this.targetNote);
                console.log('Detected:', note, 'Target:', this.targetNote, 'Match:', isMatch);

                // Ignore all notes during cooldown
                if (this.detectionCooldown) {
                    return;
                }

                if (isMatch) {
                    // Cooldown to prevent multiple detections of same correct note
                    if (note === this.lastDetectedNote) {
                        return;
                    }

                    // Correct note!
                    this.lastDetectedNote = note;
                    this.detectionCooldown = true;
                    this.score++;

                    // Show green flash
                    this.flashCorrect();

                    // Next note
                    this.nextNote();

                    setTimeout(() => {
                        this.detectionCooldown = false;
                        this.lastDetectedNote = null;
                    }, 300);
                } else {
                    // Wrong note - flash red (but not during cooldown)
                    this.flashWrong();
                }
            }

            flashCorrect() {
                const targetBox = document.getElementById('target-note');

                // Flash green
                targetBox.style.background = 'var(--accent-happy)';
                targetBox.style.border = '3px solid var(--accent-happy)';
                targetBox.style.color = 'white';

                setTimeout(() => {
                    targetBox.style.background = 'var(--surface)';
                    targetBox.style.border = '3px solid var(--primary-color)';
                    targetBox.style.color = 'var(--primary-color)';
                }, 200);
            }

            flashWrong() {
                const targetBox = document.getElementById('target-note');

                // Flash red border
                targetBox.style.border = '3px solid #ef4444';

                setTimeout(() => {
                    targetBox.style.border = '3px solid var(--primary-color)';
                }, 300);
            }

            stop() {
                this.isRunning = false;

                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }

                // Disconnect audio resources but keep UI visible
                this.releaseWakeLock();

                if (this.microphone) {
                    this.microphone.disconnect();
                    this.microphone = null;
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }

                // Update UI but keep results visible
                document.getElementById('speed-stop-btn').style.display = 'none';
                document.getElementById('speed-start-btn').style.display = 'block';
                // Don't hide success message or stats - keep them visible
            }

            endTraining() {
                // Save record
                this.saveRecord(this.score);

                // Show results
                document.getElementById('speed-stats').style.display = 'none';
                document.getElementById('target-note-display').style.display = 'none';

                const successEl = document.getElementById('speed-success');
                const finalStats = document.getElementById('speed-final-stats');
                finalStats.innerHTML = `
                    <p style="font-size: 1.2rem; color: var(--text-primary); margin: 0 0 20px 0;">Great job!</p>
                    <div style="display: flex; justify-content: center; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                        <div>
                            <div style="font-size: 0.9rem; color: var(--text-secondary);">Score</div>
                            <div style="font-size: 1.8rem; font-weight: bold; font-family: 'Courier New', monospace;">${this.score}</div>
                        </div>
                    </div>
                `;
                successEl.style.display = 'block';

                // Disconnect audio resources and stop detection
                this.stop();
            }

            cleanup() {
                this.isRunning = false;

                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }

                this.releaseWakeLock();

                if (this.microphone) {
                    this.microphone.disconnect();
                    this.microphone = null;
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }

                // Reset UI
                document.getElementById('speed-start-btn').style.display = 'block';
                document.getElementById('speed-stop-btn').style.display = 'none';
                document.getElementById('countdown-display').style.display = 'none';
                document.getElementById('speed-stats').style.display = 'none';
                document.getElementById('target-note-display').style.display = 'none';
                document.getElementById('speed-success').style.display = 'none';
            }
        }

        // Initialize trainer
        const speedTrainer = new SpeedTrainer();
    </script>
</body>
</html>
